<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Info Club</title>
    
    <link rel="icon" type="image/png" href="../../estetica/logosito.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css">
    <link rel="stylesheet" href="../../estetica/animations.css">
    <link rel="stylesheet" href="../../estetica/components.css">
    
    <style>
        html, body { height: auto; min-height: 100vh; overflow-y: auto; background: var(--bg-primary); }
        
        /* --- STILI PAGINA DETTAGLIO (VECCHI) --- */
        .hero-card { display: flex; align-items: flex-start; gap: 25px; text-align: left; }
        @media (max-width: 768px) {
            .hero-card { flex-direction: column; align-items: center; text-align: center; }
        }

        .club-logo-wrapper {
            width: 100px; height: 100px; border-radius: 50%; background: var(--bg-tertiary);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 3px solid var(--accent-gold); flex-shrink: 0;
        }
        .club-logo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .club-logo-wrapper i { font-size: 2.5rem; color: var(--accent-gold); }

        .text-content { flex: 1; }
        .comp-title-main { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); margin: 0; }
        
        .tag-captain {
            background: var(--accent-gold);
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
        }

        .stats-grid-mod { grid-template-columns: repeat(2, 1fr); }
        
        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .member-avatar {
            width: 30px; height: 30px; border-radius: 50%; background: var(--bg-tertiary);
            display: flex; align-items: center; justify-content: center;
        }
        
        .request-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- STILI LISTA CLUB (NUOVI) --- */
        .clubs-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 50px;
        }
        
        .club-card-list {
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
            position: relative;
        }
        
        .club-card-list:hover {
            transform: translateY(-2px);
            border-color: var(--accent-gold);
            background: rgba(255,255,255,0.08);
        }

        /* Colonna Sinistra: Logo */
        .club-list-logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-gold);
            flex-shrink: 0;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
        }
        .club-list-logo i { font-size: 2rem; color: var(--accent-gold); }
        .club-list-logo img { width: 100%; height: 100%; border-radius: 50%; }

        /* Colonna Centro: Info */
        .club-list-info {
            flex: 1;
            min-width: 0; /* Importante per il troncamento testo */
        }
        .club-list-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .club-list-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Colonna Destra: Azioni */
        .club-list-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            min-width: 120px;
            padding-left: 15px;
        }

        /* Badge Ruoli */
        .role-badge {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .badge-captain { 
            background: linear-gradient(135deg, #FFD700, #FFA500); 
            color: #000; 
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .badge-member { 
            background: rgba(59, 130, 246, 0.2); 
            color: #60A5FA; 
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        /* Mobile Fix per lista */
        @media (max-width: 480px) {
            .club-card-list {
                flex-direction: column;
                text-align: center;
            }
            .club-list-logo { margin-right: 0; margin-bottom: 10px; }
            .club-list-info { width: 100%; margin-bottom: 10px; }
            .club-list-actions { 
                width: 100%; 
                align-items: center; 
                flex-direction: row; 
                justify-content: space-between;
                padding-left: 0;
            }
            .club-list-actions .btn { width: auto; flex: 1; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <!-- CORRETTO: Torna alla Home -->
                <a href="../home.html" class="header-btn" style="background: transparent; border: none;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div class="logo-container">
                    <div class="logo">FC</div>
                    <span class="site-name">FC27</span>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </header>

        <!-- SIDEBAR OVERLAY -->
        <div id="overlay" class="sidebar-overlay"></div>

        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo">FC</div>
                    <span class="site-name">FC27</span>
                </div>
                <button id="close-btn" class="sidebar-close"><i class="fas fa-times"></i></button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Menu</div>
                    <a href="../home.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
                    <a href="club.html" class="nav-link active"><i class="fas fa-users"></i><span>Club</span></a>
                </div>
                <div class="nav-section">
                    <button id="logout-btn" class="nav-link" style="width: 100%; background: none; border: none; cursor: pointer; text-align: left;"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
                </div>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <div class="container" style="padding-top: 30px;">
                
                <div id="loading-state" class="text-center"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Caricamento...</p></div>

                <div id="main-content" style="display: none;">
                    
                    <!-- LISTA CLUB (Visibile se non c'è ID) -->
                    <div id="clubs-list-view" style="display: none;">
                        <h3 class="mb-3 section-title">Scegli il tuo Club</h3>
                        <div id="clubs-grid" class="clubs-grid">
                            <!-- I club verranno inseriti qui via JS -->
                        </div>
                    </div>

                    <!-- DETTAGLIO CLUB (Visibile se c'è ID) -->
                    <div id="club-detail-view" style="display: none;">
                        <div class="card hero-card">
                            <div class="club-logo-wrapper" id="club-logo">
                                <i class="fas fa-shield-alt"></i>
                            </div>
                            <div class="text-content">
                                <h1 id="club-name" class="comp-title-main">Nome Club</h1>
                                <p id="club-stadium" class="text-muted" style="margin-top:5px;"><i class="fas fa-map-marker-alt"></i> Stadio</p>
                                <span id="captain-badge" class="tag-captain" style="display:none;"><i class="fas fa-crown"></i> SEI IL CAPITANO</span>
                            </div>
                        </div>

                        <!-- Sezione Admin -->
                        <div id="admin-panel" class="card mt-4 animate-slideUp" style="display:none; border-color: var(--accent-orange);">
                            <h4 style="color: var(--accent-orange);"><i class="fas fa-user-shield"></i> Gestione Club</h4>
                            <p class="text-muted" style="font-size:0.9rem;">Gestisci le richieste di entrata.</p>
                            <div id="requests-list" class="mt-3"></div>
                        </div>

                        <div class="stats-grid mt-4 animate-slideUp stagger-1 stats-grid-mod">
                            <div class="stat-card">
                                <div class="stat-header"><i class="fas fa-users"></i><span>Membri</span></div>
                                <div id="member-count" class="stat-value-big">0</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-header"><i class="fas fa-calendar"></i><span>Fondato</span></div>
                                <div id="club-date" class="stat-value-big" style="font-size: 1rem;">-</div>
                            </div>
                        </div>

                        <div class="card mt-4 animate-slideUp stagger-2">
                            <h4 class="mb-3"><i class="fas fa-users text-gold"></i> Rosa Squadra</h4>
                            <div id="members-list"><p class="text-muted">Caricamento...</p></div>
                        </div>

                        <div class="action-buttons-container mt-4">
                            <button id="join-btn" class="btn btn-primary btn-large btn-block" style="display:none;">Unisciti</button>
                            <button id="leave-btn" class="btn btn-danger btn-large btn-block" style="display:none;">Abbandona Club</button>
                        </div>
                    </div>

                </div>

                <div id="error-state" class="empty-state" style="display: none;">
                    <div class="empty-state-icon"><i class="fas fa-exclamation-triangle" style="color: var(--accent-red);"></i></div>
                    <h3 class="empty-state-title">Errore</h3>
                    <p class="text-muted">Impossibile caricare i dati del club.</p>
                    <a href="../home.html" class="btn btn-secondary mt-2">Torna alla Home</a>
                </div>

            </div>
        </main>
    </div>

    <script>
        // CONFIG
        const BIN_ID = '6a2bea3dda38895dfeb4410a';
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        const urlParams = new URLSearchParams(window.location.search);
        const clubId = urlParams.get('id');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        let currentClub = null;
        let allData = null; 
        let clubsArray = []; 

        // UI SETUP
        document.getElementById('menu-btn').onclick = () => { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').classList.add('active'); };
        document.getElementById('close-btn').onclick = () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
        document.getElementById('overlay').onclick = () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.href = '../home-non-loggato.html'; };

        // FUNZIONI UTILITA
        function getLogo(club) {
            if (!club) return null;
            const props = ['logo', 'immagine', 'image', 'logoUrl', 'foto', 'img', 'shield'];
            for (let p of props) {
                if (club[p] && typeof club[p] === 'string' && club[p].length > 5) return club[p];
            }
            for (let key in club) {
                let val = club[key];
                if (typeof val === 'string' && val.length > 10) {
                    if (val.includes('http') || val.includes('data:image') || val.includes('.png')) return val;
                }
            }
            return null;
        }

        async function loadData() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY },
                    cache: 'no-store'
                });
                
                if(!res.ok) throw new Error("Errore API");

                const data = await res.json();
                allData = data.record; 

                let clubs = [];
                if (Array.isArray(allData)) clubs = allData;
                else clubs = allData.clubs || allData.club || [];
                
                clubsArray = clubs; // Salva globale

                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

                // LOGICA: Se c'è ID mostra dettaglio, altrimenti mostra lista
                if (clubId) {
                    currentClub = clubs.find(c => c.id === clubId);
                    if (currentClub) {
                        renderClubDetail();
                    } else {
                        document.getElementById('main-content').style.display = 'none';
                        document.getElementById('error-state').style.display = 'block';
                    }
                } else {
                    renderClubList(clubs);
                }

            } catch (e) {
                console.error(e);
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('error-state').style.display = 'block';
            }
        }

        // --- RENDER LISTA (NUOVA LOGICA) ---
        function renderClubList(clubs) {
            document.getElementById('clubs-list-view').style.display = 'block';
            const grid = document.getElementById('clubs-grid');
            
            if (clubs.length === 0) {
                grid.innerHTML = '<p class="text-muted text-center">Nessun club creato al momento.</p>';
                return;
            }

            let html = '';
            clubs.forEach(c => {
                // 1. Logo
                const logo = getLogo(c);
                let logoHtml = logo ? `<img src="${logo}">` : `<i class="fas fa-shield-alt"></i>`;
                
                // 2. Conteggio Membri
                const members = c.members || [];
                const memberCount = members.length;

                // 3. Logica Ruolo
                let roleBadge = '';
                
                if (user) {
                    // Controlla se Capitano (supporta diverse chiavi nel database)
                    const isCaptain = (
                        String(c.captain) === String(user.id) ||
                        String(c.owner) === String(user.id) ||
                        String(c.presidente) === String(user.id) ||
                        String(c.createdBy) === String(user.id) ||
                        String(c.founder) === String(user.id)
                    );
                    
                    const isMember = members.includes(user.id);

                    if (isCaptain) {
                        roleBadge = `<span class="role-badge badge-captain"><i class="fas fa-crown"></i> CAPITANO</span>`;
                    } else if (isMember) {
                        roleBadge = `<span class="role-badge badge-member"><i class="fas fa-user"></i> MEMBRO</span>`;
                    }
                }

                // 4. Costruisci HTML Card
                html += `
                    <div class="club-card-list">
                        <div class="club-list-logo">
                            ${logoHtml}
                        </div>
                        <div class="club-list-info">
                            <h4 class="club-list-name">${c.name || c.nome || 'Nome Club'}</h4>
                            <div class="club-list-meta">
                                <i class="fas fa-users"></i>
                                <span>${memberCount} Membri</span>
                            </div>
                        </div>
                        <div class="club-list-actions">
                            ${roleBadge}
                            <a href="?id=${c.id}" class="btn btn-primary btn-sm">Visualizza</a>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // --- RENDER DETTAGLIO (VECCHIA LOGICA) ---
        function renderClubDetail() {
            document.getElementById('clubs-list-view').style.display = 'none';
            document.getElementById('club-detail-view').style.display = 'block';

            // Nome e Logo
            document.getElementById('club-name').textContent = currentClub.name || currentClub.nome || 'Club';
            const logoSrc = getLogo(currentClub);
            if (logoSrc) {
                document.getElementById('club-logo').innerHTML = `<img src="${logoSrc}" alt="Logo">`;
            }

            // Stadio
            const stadium = currentClub.stadium || currentClub.stadio;
            document.getElementById('club-stadium').textContent = stadium ? `<i class="fas fa-map-marker-alt"></i> ${stadium}` : '';

            // Data
            if(currentClub.createdAt) document.getElementById('club-date').textContent = new Date(currentClub.createdAt).toLocaleDateString('it-IT');

            // Membri
            const members = currentClub.members || [];
            document.getElementById('member-count').textContent = members.length;
            
            let membersHtml = '';
            members.forEach(mId => {
                membersHtml += `<div class="member-item">
                    <div class="member-avatar"><i class="fas fa-user"></i></div>
                    <div class="member-name">ID: ${mId}</div>
                </div>`;
            });
            document.getElementById('members-list').innerHTML = membersHtml || '<p class="text-muted">Nessun membro.</p>';

            // --- LOGICA CAPITANO / UTENTE ---
            const isCaptain = user && (
                String(currentClub.captain) === String(user.id) ||
                String(currentClub.owner) === String(user.id) ||
                String(currentClub.presidente) === String(user.id) ||
                String(currentClub.createdBy) === String(user.id) ||
                String(currentClub.founder) === String(user.id)
            );

            const isMember = user && members.includes(user.id);

            if (isCaptain) {
                document.getElementById('captain-badge').style.display = 'inline-flex';
                document.getElementById('admin-panel').style.display = 'block';
                renderRequests();
            } else if (isMember) {
                document.getElementById('leave-btn').style.display = 'block';
            } else {
                document.getElementById('join-btn').style.display = 'block';
                document.getElementById('join-btn').onclick = () => requestJoin();
            }
        }

        function renderRequests() {
            const requests = currentClub.requests || [];
            const listEl = document.getElementById('requests-list');

            if (requests.length === 0) {
                listEl.innerHTML = '<p class="text-muted">Nessuna richiesta in sospeso.</p>';
                return;
            }

            let html = '';
            requests.forEach(userId => {
                html += `<div class="request-item">
                    <span>Utente ID: ${userId}</span>
                    <div>
                        <button class="btn btn-primary btn-xs" onclick="accept('${userId}')"><i class="fas fa-check"></i></button>
                        <button class="btn btn-danger btn-xs" onclick="reject('${userId}')" style="margin-left:5px;"><i class="fas fa-times"></i></button>
                    </div>
                </div>`;
            });
            listEl.innerHTML = html;
        }

        // Azioni Admin
        window.accept = async (userId) => {
            if(!confirm("Accettare questo membro?")) return;
            
            if(!currentClub.members) currentClub.members = [];
            currentClub.members.push(userId);
            currentClub.requests = currentClub.requests.filter(id => id !== userId);

            await saveData();
            alert('Membro aggiunto!');
            location.reload();
        };

        window.reject = async (userId) => {
            if(!confirm("Rifiutare questa richiesta?")) return;
            currentClub.requests = currentClub.requests.filter(id => id !== userId);
            await saveData();
            alert('Richiesta rifiutata.');
            location.reload();
        };

        // Richiesta utente normale
        async function requestJoin() {
            if(!user) return alert("Accedi per unirti.");
            
            if(!currentClub.requests) currentClub.requests = [];
            if(currentClub.requests.includes(user.id)) return alert("Richiesta già inviata.");

            currentClub.requests.push(user.id);
            await saveData();
            alert('Richiesta inviata al capitano!');
            location.reload();
        }

        // Salva dati
        async function saveData() {
            let payload;
            if (Array.isArray(allData)) {
                let idx = allData.findIndex(c => c.id === clubId);
                if(idx !== -1) allData[idx] = currentClub;
                payload = allData;
            } else {
                let key = allData.clubs ? 'clubs' : 'club';
                let list = allData[key];
                let idx = list.findIndex(c => c.id === clubId);
                if(idx !== -1) list[idx] = currentClub;
                payload = allData;
            }

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(payload)
            });
        }

        loadData();
    </script>
</body>
</html>
