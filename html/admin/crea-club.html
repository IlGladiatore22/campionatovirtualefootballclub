<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVFC ADMIN - Crea Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css?v=2">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        .logo-preview { width: 100px; height: 100px; border-radius: 50%; background: var(--bg-tertiary); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed var(--border-color); cursor: pointer; transition: all 0.3s; }
        .logo-preview:hover { border-color: var(--accent-gold); }
        .logo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .logo-preview i { font-size: 2rem; color: var(--text-muted); }
        .color-sync { display: flex; gap: 10px; align-items: center; }
        .color-sync input[type="color"] { width: 50px; height: 40px; padding: 0; border: none; cursor: pointer; background: none; }
        .color-sync input[type="text"] { flex: 1; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="dashboard.html" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></a>
                <span class="site-name" style="color: var(--accent-orange);">Crea Club</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="max-width: 600px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <h2 class="mb-3 text-center"><i class="fas fa-shield-alt text-gold"></i> Nuovo Club</h2>
                    
                    <div class="logo-preview" onclick="document.getElementById('logo-input').click()">
                        <i class="fas fa-camera" id="placeholder-icon"></i>
                        <img id="preview-img" src="" style="display: none;">
                    </div>
                    <input type="file" id="logo-input" accept="image/*" style="display: none;">
                    
                    <form id="form">
                        <div class="input-group">
                            <label class="input-label">Nome Club *</label>
                            <input type="text" id="name" class="input-field" placeholder="Es. FC Warriors" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Abbreviazione (Tag)</label>
                            <input type="text" id="tag" class="input-field" placeholder="FCW" maxlength="4">
                        </div>

                        <div class="input-group">
                            <label class="input-label">Seleziona Capitano</label>
                            <select id="captain" class="input-field">
                                <option value="">-- Caricamento utenti... --</option>
                            </select>
                        </div>

                        <div class="grid-2">
                            <div class="input-group">
                                <label class="input-label">Colore Primario</label>
                                <div class="color-sync">
                                    <input type="color" id="color1" value="#f5a623">
                                    <input type="text" id="color1-text" class="input-field" value="#f5a623" maxlength="7">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Colore Secondario</label>
                                <div class="color-sync">
                                    <input type="color" id="color2" value="#1a1a24">
                                    <input type="text" id="color2-text" class="input-field" value="#1a1a24" maxlength="7">
                                </div>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Stadio</label>
                            <input type="text" id="stadium" class="input-field" placeholder="Nome stadio">
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3" style="background: var(--accent-orange);">Crea Club</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURAZIONE
        // ==========================================
        const BIN_ID_USERS = 'INSERISCI_ID_BIN_UTENTI_QUI'; 
        const BIN_ID_CLUBS = 'INSERISCI_ID_BIN_CLUB_QUI'; 
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        // ==========================================
        // CONTROLLO SESSIONE
        // ==========================================
        const admin = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!admin || !admin.isAdmin) {
            window.location.href = 'accesso-admin.html';
        }

        // ==========================================
        // FUNZIONI UTILITA
        // ==========================================
        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = (err) => reject(err);
                    img.src = event.target.result;
                };
                reader.onerror = (err) => reject(err);
                reader.readAsDataURL(file);
            });
        }

        // ==========================================
        // CARICA UTENTI
        // ==========================================
        async function loadUsersForSelect() {
            const select = document.getElementById('captain');
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_USERS}/latest`, {
                    headers: { 'X-Master-Key': API_KEY },
                    cache: 'no-store'
                });
                if (!res.ok) throw new Error("Errore caricamento utenti");
                
                const data = await res.json();
                const users = data.record.users || []; // Assumendo che gli utenti restino in inglese nel DB
                
                select.innerHTML = '<option value="">-- Seleziona Utente --</option>';
                users.forEach(u => {
                    select.innerHTML += `<option value="${u.id}">${u.nomeEA} (${u.gamertag})</option>`;
                });
            } catch (e) {
                console.error(e);
                select.innerHTML = '<option value="">Errore DB</option>';
            }
        }
        loadUsersForSelect();

        // ==========================================
        // GESTIONE LOGO
        // ==========================================
        let logoBase64 = '';
        document.getElementById('logo-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                try {
                    logoBase64 = await compressImage(file, 200, 200, 0.7);
                    document.getElementById('preview-img').src = logoBase64;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('placeholder-icon').style.display = 'none';
                } catch (err) {
                    console.error("Errore elaborazione immagine", err);
                }
            }
        });

        // Sync Color
        ['color1', 'color2'].forEach(id => {
            const color = document.getElementById(id);
            const text = document.getElementById(id + '-text');
            color.oninput = () => text.value = color.value;
            text.oninput = () => { if(/^#[0-9A-Fa-f]{6}$/.test(text.value)) color.value = text.value; };
        });

        // ==========================================
        // SUBMIT FORM (STRUTTURA ITALIANO)
        // ==========================================
        document.getElementById('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio...';

            try {
                // 1. Leggi lista club esistente
                const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, {
                    headers: { 'X-Master-Key': API_KEY },
                    cache: 'no-store'
                });
                
                if (getRes.status === 404) throw new Error("Bin non trovato (404). Controlla l'ID.");
                if (!getRes.ok) throw new Error("Errore lettura database.");
                
                const getData = await getRes.json();
                
                // Leggiamo la lista "club" (in italiano)
                let listaClub = getData.record.club || [];

                const captainId = document.getElementById('captain').value;
                
                // 2. Crea oggetto in italiano
                const nuovoClub = {
                    id: 'club_' + Date.now(),
                    nome: document.getElementById('name').value, // In italiano
                    tag: document.getElementById('tag').value.toUpperCase(),
                    logo: logoBase64, 
                    capitano: captainId || null, // In italiano
                    membri: captainId ? [captainId] : [], // In italiano
                    colori: { // In italiano
                        primario: document.getElementById('color1').value, 
                        secondario: document.getElementById('color2').value
                    },
                    stadio: document.getElementById('stadium').value, // In italiano
                    formazione: '4-3-3', // In italiano
                    tattiche: {}, // In italiano
                    schieramento: {}, // In italiano (ex lineup)
                    richieste: [], // In italiano
                    creatoIl: new Date().toISOString() // In italiano
                };

                // 3. Aggiungi e salva
                listaClub.push(nuovoClub);
                
                const saveRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    // Salviamo con la chiave "club"
                    body: JSON.stringify({ "club": listaClub }) 
                });

                if (saveRes.status === 403) throw new Error("Errore 403: Permesso negato.");
                if (!saveRes.ok) throw new Error("Errore salvataggio.");

                alert('Club creato con successo!');
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error(err);
                alert("Errore: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Crea Club';
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('admin');
            window.location.href = 'accesso-admin.html';
        });
    </script>
</body>
</html>
