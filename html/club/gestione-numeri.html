<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Gestione Numeri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Corretto: due livelli sopra per uscire da html/club -->
    <link rel="stylesheet" href="../../estetica/style.css">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        body { background: #0d1117; color: #e0e0e0; }
        .page-container { max-width: 600px; margin: 0 auto; padding: 80px 20px; }
        
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
        
        .player-row {
            display: flex; align-items: center; justify-content: space-between;
            background: #21262d; padding: 15px; margin-bottom: 8px;
            border-radius: 8px; border: 1px solid #30363d;
        }
        .player-info { display: flex; align-items: center; gap: 15px; }
        .player-avatar { 
            width: 40px; height: 40px; background: #30363d; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem;
            border: 2px solid var(--accent-gold);
        }
        .player-name { font-weight: 600; }
        .player-name small { display: block; font-size: 0.75rem; opacity: 0.6; font-weight: 400; }
        
        .number-input {
            width: 60px; text-align: center;
            background: #0d1117; border: 1px solid #30363d;
            color: #fff; padding: 8px; border-radius: 6px;
            font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: bold;
        }
        .number-input:focus { border-color: var(--accent-gold); outline: none; }
        
        .actions { display: flex; gap: 10px; margin-top: 25px; }
        .actions .btn { flex: 1; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <button onclick="history.back()" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></button>
            <span class="site-name">Numeri Maglia</span>
        </div>
    </header>

    <main class="main-content">
        <div class="page-container">
            <div class="card animate-slideUp">
                <h2 style="margin-bottom: 5px;">Gestione Numeri</h2>
                <p style="opacity: 0.6; margin-bottom: 25px;">Assegna un numero (1-99) a ogni giocatore.</p>

                <div id="players-list"></div>

                <div class="actions">
                    <button class="btn btn-secondary" onclick="history.back()">Annulla</button>
                    <button class="btn btn-primary" id="save-btn"><i class="fas fa-save"></i> Salva Tutto</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Controllo Accesso
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        const urlP = new URLSearchParams(window.location.search);
        const cId = urlP.get('id');
        
        // Corretto: torna alla root html/
        if (!user || !cId) window.location.href = '../accesso.html';

        let clubs = JSON.parse(localStorage.getItem('fc27_clubs') || '[]');
        let users = JSON.parse(localStorage.getItem('fc27_users') || '[]');
        let club = clubs.find(c => c.id === cId);
        
        // Corretto: file nella stessa cartella
        if (!club) window.location.href = 'club.html';

        // Verifica se è capitano
        const uid = String(user.id);
        const capId = String(club.captain);
        if (uid !== capId) {
            alert('Accesso riservato al Capitano.');
            history.back();
        }

        const members = club.members || [];
        const rosterList = document.getElementById('players-list');

        // Render Lista
        function renderList() {
            rosterList.innerHTML = '';
            
            members.forEach(mId => {
                var u = users.find(x => String(x.id) === String(mId));
                if (!u) return;

                // Cerca numero esistente
                var currentNum = '';
                if (club.lineup) {
                    Object.values(club.lineup).forEach(slot => {
                        if (String(slot.id) === String(mId)) currentNum = slot.num || '';
                    });
                }

                // Cerca se è in panchina (non in formazione)
                var isInLineup = false;
                if (club.lineup) {
                    isInLineup = Object.values(club.lineup).some(slot => String(slot.id) === String(mId));
                }

                const div = document.createElement('div');
                div.className = 'player-row';
                div.innerHTML = `
                    <div class="player-info">
                        <div class="player-avatar">${u.nomeEA.substring(0,2).toUpperCase()}</div>
                        <div class="player-name">
                            ${u.nomeEA}
                            <small>@${u.gamertag}</small>
                        </div>
                    </div>
                    <input type="number" class="number-input" data-id="${u.id}" data-in-lineup="${isInLineup}" value="${currentNum}" placeholder="#" min="1" max="99">
                `;
                rosterList.appendChild(div);
            });
        }

        // Salva
        document.getElementById('save-btn').onclick = function() {
            const inputs = document.querySelectorAll('.number-input');
            
            inputs.forEach(input => {
                let num = input.value;
                const pId = input.dataset.id;
                const isInLineup = input.dataset.inLineup === 'true';

                if (!num) return; // Se vuoto non fare nulla

                if(num < 1 || num > 99) {
                    alert('I numeri devono essere tra 1 e 99.');
                    return;
                }

                // Se è in formazione, aggiorna direttamente il suo slot
                if (isInLineup && club.lineup) {
                    Object.keys(club.lineup).forEach(k => {
                        if (String(club.lineup[k].id) === pId) {
                            club.lineup[k].num = num;
                        }
                    });
                } else {
                    // Gestione numeri per giocatori non in formazione
                    if (!club.lineup) club.lineup = {};
                    // Trova indice libero o crea voce panchina
                    let benchIdx = Object.keys(club.lineup).length + 100; // Indici > 100 = panchina
                    club.lineup[benchIdx] = {
                        id: pId,
                        num: num,
                        name: users.find(x => x.id === pId)?.nomeEA || '?'
                    };
                }
            });

            // Salva
            localStorage.setItem('fc27_clubs', JSON.stringify(clubs));
            alert('Numeri salvati!');
            // Corretto: file nella stessa cartella
            window.location.href = 'club-info.html?id=' + cId;
        };

        renderList();
    </script>
</body>
</html>
