<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Gestione Numeri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        body { background: #0d1117; color: #e0e0e0; }
        .page-container { max-width: 600px; margin: 0 auto; padding: 80px 20px; }
        
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
        
        .player-row {
            display: flex; align-items: center; justify-content: space-between;
            background: #21262d; padding: 15px; margin-bottom: 8px;
            border-radius: 8px; border: 1px solid #30363d;
        }
        .player-info { display: flex; align-items: center; gap: 15px; }
        .player-avatar { 
            width: 40px; height: 40px; background: #30363d; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem;
            border: 2px solid var(--accent-gold);
        }
        .player-name { font-weight: 600; }
        .player-name small { display: block; font-size: 0.75rem; opacity: 0.6; font-weight: 400; }
        
        .number-input {
            width: 60px; text-align: center;
            background: #0d1117; border: 1px solid #30363d;
            color: #fff; padding: 8px; border-radius: 6px;
            font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: bold;
        }
        .number-input:focus { border-color: var(--accent-gold); outline: none; }
        
        .actions { display: flex; gap: 10px; margin-top: 25px; }
        .actions .btn { flex: 1; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <button onclick="history.back()" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></button>
            <span class="site-name">Numeri Maglia</span>
        </div>
    </header>

    <main class="main-content">
        <div class="page-container">
            <!-- Loading State -->
            <div id="loading-state" class="text-center">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>Caricamento dati...</p>
            </div>

            <!-- Content -->
            <div id="main-card" class="card animate-slideUp" style="display:none;">
                <h2 style="margin-bottom: 5px;">Gestione Numeri</h2>
                <p style="opacity: 0.6; margin-bottom: 25px;">Assegna un numero (1-99) a ogni giocatore.</p>

                <div id="players-list"></div>

                <div class="actions">
                    <button class="btn btn-secondary" onclick="history.back()">Annulla</button>
                    <button class="btn btn-primary" id="save-btn"><i class="fas fa-save"></i> Salva Tutto</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // === CONFIG ===
        const BIN_ID_USERS = '6a2ae33cda38895dfeaee508';
        const BIN_ID_CLUBS = '6a2bea3dda38895dfeb4410a';
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        const user = JSON.parse(localStorage.getItem('user') || 'null');
        const urlP = new URLSearchParams(window.location.search);
        const cId = urlP.get('id');

        let club = null;
        let users = [];
        let clubs = [];

        window.onload = async function() {
            // Controllo base
            if (!user || !cId) {
                window.location.href = '../accesso.html';
                return;
            }

            try {
                // 1. Carica Utenti
                const resUsers = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_USERS}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }, cache: 'no-store'
                });
                const dataUsers = await resUsers.json();
                users = dataUsers.record.users || [];

                // 2. Carica Club
                const resClubs = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }, cache: 'no-store'
                });
                const dataClubs = await resClubs.json();
                clubs = dataClubs.record.clubs || [];

                // 3. Troova Club
                club = clubs.find(c => c.id === cId);
                if (!club) {
                    alert("Club non trovato.");
                    window.location.href = 'club.html';
                    return;
                }

                // 4. Controllo Capitano
                const uid = String(user.id);
                const capId = String(club.captain);
                if (uid !== capId) {
                    alert('Accesso riservato al Capitano.');
                    history.back();
                    return;
                }

                // Tutto ok, mostra UI
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('main-card').style.display = 'block';
                renderList();

            } catch (e) {
                console.error(e);
                alert("Errore di connessione al database.");
            }
        };

        function renderList() {
            const rosterList = document.getElementById('players-list');
            rosterList.innerHTML = '';
            const members = club.members || [];

            members.forEach(mId => {
                const u = users.find(x => String(x.id) === String(mId));
                if (!u) return;

                // Cerca numero esistente
                let currentNum = '';
                let isInLineup = false;
                
                if (club.lineup) {
                    Object.values(club.lineup).forEach(slot => {
                        if (String(slot.id) === String(mId)) {
                            currentNum = slot.num || '';
                            isInLineup = true;
                        }
                    });
                }

                const div = document.createElement('div');
                div.className = 'player-row';
                div.innerHTML = `
                    <div class="player-info">
                        <div class="player-avatar">${u.nomeEA.substring(0,2).toUpperCase()}</div>
                        <div class="player-name">
                            ${u.nomeEA}
                            <small>@${u.gamertag}</small>
                        </div>
                    </div>
                    <input type="number" class="number-input" data-id="${u.id}" value="${currentNum}" placeholder="#" min="1" max="99">
                `;
                rosterList.appendChild(div);
            });
        }

        document.getElementById('save-btn').onclick = async function() {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio...';
            
            const inputs = document.querySelectorAll('.number-input');
            let hasError = false;

            inputs.forEach(input => {
                let num = input.value;
                const pId = input.dataset.id;

                // Se vuoto, non fare nulla (o cancella se vuoi)
                if (!num) return;

                if(num < 1 || num > 99) {
                    alert('I numeri devono essere tra 1 e 99.');
                    hasError = true;
                    return;
                }

                // Aggiorna la formazione
                if (club.lineup) {
                    Object.keys(club.lineup).forEach(k => {
                        if (String(club.lineup[k].id) === pId) {
                            club.lineup[k].num = num;
                        }
                    });
                }
            });

            if (hasError) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Salva Tutto';
                return;
            }

            // Salva su JSONBin
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ clubs })
                });
                
                alert('Numeri salvati con successo!');
                window.location.href = 'club-info.html?id=' + cId;

            } catch (e) {
                alert("Errore durante il salvataggio.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Salva Tutto';
            }
        };
    </script>
</body>
</html>
