<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Accesso</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../estetica/style.css?v=2">
    <link rel="stylesheet" href="../estetica/components.css?v=2">
    <style>
        html, body { height: auto; min-height: 100vh; overflow-y: auto; }
        
        .success-message {
            padding: 12px 16px;
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid var(--accent-green);
            border-radius: var(--border-radius);
            color: var(--accent-green);
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="home-non-loggato.html" class="logo-container" style="text-decoration: none;">
                    <div class="logo">FC</div>
                    <span class="site-name">FC27</span>
                </a>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="max-width: 450px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <div class="text-center mb-3">
                        <div class="logo" style="width: 60px; height: 60px; font-size: 1.3rem; margin: 0 auto 16px;">FC</div>
                        <h2>Accedi</h2>
                        <p class="text-muted mt-1">Entra nel tuo account FC27</p>
                    </div>

                    <div id="success-message" class="success-message">
                        <i class="fas fa-check-circle"></i>
                        <span>Registrazione completata! Ora puoi accedere.</span>
                    </div>

                    <div id="error-message" class="mb-2" style="display: none; padding: 12px 16px; background: rgba(230, 57, 70, 0.15); border: 1px solid var(--accent-red); border-radius: var(--border-radius); color: var(--accent-red);">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="error-text"></span>
                    </div>

                    <form id="login-form">
                        <div class="input-group">
                            <label class="input-label" for="gamertag"><i class="fas fa-gamepad"></i> Gamertag</label>
                            <input type="text" id="gamertag" class="input-field" placeholder="Il tuo gamertag" autocomplete="off" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="password"><i class="fas fa-lock"></i> Password</label>
                            <div style="position: relative;">
                                <input type="password" id="password" class="input-field" placeholder="La tua password" required>
                                <button type="button" id="toggle-btn" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;">
                                    <i class="fas fa-eye" id="pass-icon"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3">
                            <i class="fas fa-sign-in-alt"></i> Accedi
                        </button>
                    </form>

                    <p class="text-center text-muted mt-3">
                        Non hai un account? <a href="registrazione.html">Registrati</a>
                    </p>

                    <div class="text-center mt-4" style="padding-top: 20px; border-top: 1px solid var(--border-color);">
                        <p class="text-muted" style="font-size: 0.85rem;">Sei un amministratore?</p>
                        <a href="admin/accesso-admin.html" class="btn btn-secondary btn-block" style="border-color: var(--accent-orange); color: var(--accent-orange);">
                            <i class="fas fa-shield-alt"></i> Accesso Admin
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- CONFIGURAZIONE JSONBIN ---
        const BIN_ID = '6a2ae33cda38895dfeaee508';
        const API_KEY = '$2a$10$m/VICwvC9TIv5IoVNGl10cFRhUlaEGq75y5yBcN/.AQ/neSYcYaw';

        // Toggle password
        document.getElementById('toggle-btn').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = document.getElementById('pass-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Messaggio successo registrazione
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('registered') === 'true') {
            document.getElementById('success-message').style.display = 'block';
        }

        // Login con Database Online
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const gamertagInput = document.getElementById('gamertag').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            errorDiv.style.display = 'none';

            if (!gamertagInput || !passwordInput) {
                errorText.textContent = 'Compila tutti i campi';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                // 1. Scarica gli utenti dal Database JSONBin
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Access-Key': API_KEY }
                });

                if (response.status === 401) throw new Error("Errore connessione al database (Chiave non valida).");
                if (!response.ok) throw new Error("Impossibile raggiungere il database.");

                const data = await response.json();
                const users = data.record.users || [];

                // 2. Cerca l'utente
                const foundUser = users.find(u => 
                    u.gamertag && u.gamertag.toLowerCase() === gamertagInput.toLowerCase() && 
                    u.password === passwordInput
                );

                if (!foundUser) {
                    errorText.textContent = 'Gamertag o password non corretti';
                    errorDiv.style.display = 'block';
                    return;
                }

                // 3. Salva in locale e reindirizza
                localStorage.setItem('user', JSON.stringify(foundUser));
                localStorage.setItem('auth_token', 'token_' + Date.now());

                window.location.href = 'home.html';

            } catch (err) {
                console.error(err);
                errorText.textContent = err.message || "Errore generico durante l'accesso.";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
