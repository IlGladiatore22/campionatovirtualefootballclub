<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVFC ADMIN - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css">
    <!-- RIPRISTINATO: Link animations.css -->
    <link rel="stylesheet" href="../../estetica/animations.css">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        /* Statistiche */
        .stat-card {
            background: var(--gradient-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            text-align: center;
        }
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-gold);
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 8px;
        }

        /* Griglia Statistiche Modificata per 5 elementi */
        .stats-grid-admin {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobile: 2 colonne */
            gap: 20px;
            margin-bottom: 40px;
        }
        @media (min-width: 768px) {
            .stats-grid-admin { grid-template-columns: repeat(3, 1fr); } /* Tablet: 3 colonne */
        }
        @media (min-width: 1024px) {
            .stats-grid-admin { grid-template-columns: repeat(5, 1fr); } /* Desktop: 5 colonne */
        }

        /* Griglia Azioni Rapide */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px;
            margin-top: 10px;
        }
        @media (min-width: 768px) {
            .actions-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 1024px) {
            .actions-grid { grid-template-columns: repeat(6, 1fr); } /* 6 colonne per i bottoni */
        }
        
        .action-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
        }
        .action-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .action-icon {
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .action-title { font-weight: 600; color: var(--text-primary); }
        .action-subtitle { font-size: 0.8rem; color: var(--text-muted); line-height: 1.2; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <div class="logo-container">
                    <div class="logo" style="background: var(--accent-orange);">FC</div>
                    <span class="site-name" style="color: var(--accent-orange);">Admin Panel</span>
                </div>
            </div>
            <div class="header-right">
                <span class="user-greeting">Admin: <span id="admin-name">-</span></span>
                <button class="header-btn" id="logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="padding: 30px 20px;">
                
                <h1 class="mb-4">Dashboard</h1>

                <!-- Riga Statistiche (5 elementi) -->
                <div class="stats-grid-admin">
                    <div class="stat-card animate-slideUp stagger-1">
                        <div class="stat-value" id="stat-users">0</div>
                        <div class="stat-label">Utenti</div>
                    </div>
                    <div class="stat-card animate-slideUp stagger-2">
                        <div class="stat-value" id="stat-clubs">0</div>
                        <div class="stat-label">Club</div>
                    </div>
                    <div class="stat-card animate-slideUp stagger-3">
                        <div class="stat-value" id="stat-pending">0</div>
                        <div class="stat-label">Richieste</div>
                    </div>
                    <div class="stat-card animate-slideUp stagger-4">
                        <div class="stat-value" id="stat-notifications">0</div>
                        <div class="stat-label">Notifiche</div>
                    </div>
                     <div class="stat-card animate-slideUp stagger-5">
                        <div class="stat-value" id="stat-tournaments">0</div>
                        <div class="stat-label">Tornei Attivi</div>
                    </div>
                </div>

                <!-- Sezione Azioni Rapide -->
                <h3 class="mb-2">Azioni Rapide</h3>
                <div class="actions-grid">
                    
                    <a href="crea-club.html" class="action-card animate-slideUp">
                        <div class="action-icon" style="background: rgba(245, 166, 35, 0.1);"><i class="fas fa-shield-alt" style="color: var(--accent-gold);"></i></div>
                        <div><div class="action-title">Crea Club</div><div class="action-subtitle">Aggiungi club</div></div>
                    </a>

                    <a href="crea-competizione.html" class="action-card animate-slideUp">
                        <div class="action-icon" style="background: rgba(52, 152, 219, 0.1);"><i class="fas fa-trophy" style="color: var(--accent-blue);"></i></div>
                        <div><div class="action-title">Crea Competizione</div><div class="action-subtitle">Nuova lega</div></div>
                    </a>

                    <a href="crea-torneo.html" class="action-card animate-slideUp">
                        <div class="action-icon" style="background: rgba(155, 89, 182, 0.1);"><i class="fas fa-medal" style="color: #9b59b6;"></i></div>
                        <div><div class="action-title">Crea Torneo</div><div class="action-subtitle">Nuovo torneo</div></div>
                    </a>

                    <!-- NUOVO: Gestione Tornei -->
                    <a href="gestisci-tornei.html" class="action-card animate-slideUp">
                        <div class="action-icon" style="background: rgba(231, 76, 60, 0.1);"><i class="fas fa-table" style="color: var(--accent-red);"></i></div>
                        <div><div class="action-title">Gestione Tornei</div><div class="action-subtitle">Gironi e Bracket</div></div>
                    </a>

                    <a href="gestisci-competizione.html" class="action-card animate-slideUp">
                        <div class="action-icon" style="background: rgba(26, 188, 156, 0.1);"><i class="fas fa-cogs" style="color: #1abc9c;"></i></div>
                        <div><div class="action-title">Gestione Leghe</div><div class="action-subtitle">Calendari</div></div>
                    </a>

                    <a href="../club.html" class="action-card animate-slideUp">
                        <div class="action-icon" style="background: rgba(236, 240, 241, 0.1);"><i class="fas fa-users" style="color: #bdc3c7;"></i></div>
                        <div><div class="action-title">Lista Club</div><div class="action-subtitle">Vedi tutti</div></div>
                    </a>

                </div>
                
            </div>
        </main>
    </div>

    <script>
        // =============================================
        // CONTROLLO SESSIONE ROBUSTO
        // =============================================
        // Controlliamo sia la chiave 'admin' (usata da accesso-admin.html precedente)
        // sia la chiave 'user' (usata dal resto dell'app) per evitare loop.
        
        const adminSession = JSON.parse(localStorage.getItem('admin') || 'null');
        const userSession = JSON.parse(localStorage.getItem('user') || 'null');
        
        let currentSession = null;

        // Priorità alla sessione admin, fallback a user con permessi admin
        if (adminSession && adminSession.isAdmin) {
            currentSession = adminSession;
        } else if (userSession && userSession.isAdmin) {
            currentSession = userSession;
        }

        // Se nessuna sessione admin valida, rimanda al login
        if (!currentSession) {
            window.location.href = 'accesso-admin.html';
            throw new Error("Accesso negato");
        }

        document.getElementById('admin-name').textContent = currentSession.nomeEA || currentSession.username || 'Admin';

        // =============================================
        // CALCOLO STATISTICHE
        // =============================================
        const users = JSON.parse(localStorage.getItem('fc27_users') || '[]');
        const clubs = JSON.parse(localStorage.getItem('fc27_clubs') || '[]');
        const tournaments = JSON.parse(localStorage.getItem('fc27_tournaments') || '[]');
        const notifications = JSON.parse(localStorage.getItem('fc27_notifications') || '[]');

        let pendingRequests = 0;
        clubs.forEach(c => {
            if (c.requests) {
                pendingRequests += c.requests.filter(r => r.status === 'pending').length;
            }
        });

        document.getElementById('stat-users').textContent = users.length;
        document.getElementById('stat-clubs').textContent = clubs.length;
        document.getElementById('stat-pending').textContent = pendingRequests;
        document.getElementById('stat-notifications').textContent = notifications.filter(n => !n.read).length;
        document.getElementById('stat-tournaments').textContent = tournaments.filter(t => t.status !== 'chiusa').length;

        // =============================================
        // LOGOUT
        // =============================================
        document.getElementById('logout-btn').addEventListener('click', function() {
            // Puliamo entrambe le possibili chiavi di sessione
            localStorage.removeItem('user');
            localStorage.removeItem('admin');
            localStorage.removeItem('auth_token');
            window.location.href = 'accesso-admin.html';
        });
    </script>
</body>
</html>
