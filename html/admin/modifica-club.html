<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVFC ADMIN - Modifica Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css?v=2">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        .logo-preview { width: 100px; height: 100px; border-radius: 50%; background: var(--bg-tertiary); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed var(--border-color); cursor: pointer; transition: all 0.3s; }
        .logo-preview:hover { border-color: var(--accent-gold); }
        .logo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .logo-preview i { font-size: 2rem; color: var(--text-muted); }
        .color-sync { display: flex; gap: 10px; align-items: center; }
        .color-sync input[type="color"] { width: 50px; height: 40px; padding: 0; border: none; cursor: pointer; background: none; }
        .color-sync input[type="text"] { flex: 1; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="lista-club.html" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></a>
                <span class="site-name" style="color: var(--accent-orange);">Modifica Club</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="max-width: 600px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <h2 class="mb-3 text-center"><i class="fas fa-edit text-gold"></i> Modifica Club</h2>
                    
                    <div class="logo-preview" onclick="document.getElementById('logo-input').click()">
                        <i class="fas fa-camera" id="placeholder-icon"></i>
                        <img id="preview-img" src="" style="display: none;">
                    </div>
                    <input type="file" id="logo-input" accept="image/*" style="display: none;">
                    
                    <form id="form">
                        <input type="hidden" id="club-id">
                        
                        <div class="input-group">
                            <label class="input-label">Nome Club *</label>
                            <input type="text" id="name" class="input-field" placeholder="Es. FC Warriors" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Abbreviazione (Tag)</label>
                            <input type="text" id="tag" class="input-field" placeholder="FCW" maxlength="4">
                        </div>

                        <div class="input-group">
                            <label class="input-label">Seleziona Capitano</label>
                            <select id="captain" class="input-field">
                                <option value="">-- Caricamento... --</option>
                            </select>
                        </div>

                        <div class="grid-2">
                            <div class="input-group">
                                <label class="input-label">Colore Primario</label>
                                <div class="color-sync">
                                    <input type="color" id="color1" value="#f5a623">
                                    <input type="text" id="color1-text" class="input-field" value="#f5a623" maxlength="7">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Colore Secondario</label>
                                <div class="color-sync">
                                    <input type="color" id="color2" value="#1a1a24">
                                    <input type="text" id="color2-text" class="input-field" value="#1a1a24" maxlength="7">
                                </div>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Stadio</label>
                            <input type="text" id="stadium" class="input-field" placeholder="Nome stadio">
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3" style="background: var(--accent-orange);">Salva Modifiche</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // === CONFIGURAZIONE JSONBIN ===
        const BIN_ID_CLUBS = '6a2bea3dda38895dfeb4410a';
        const BIN_ID_USERS = '6a2ae33cda38895dfeaee508';
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        // === CONTROLLO SESSIONE ADMIN ===
        const admin = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!admin || !admin.isAdmin) window.location.href = 'accesso-admin.html';

        // === VARIABILI GLOBALI ===
        let currentClubData = null;
        let logoBase64 = '';

        // === FUNZIONE CARICA DATI ===
        async function loadClubData() {
            const urlParams = new URLSearchParams(window.location.search);
            const clubId = urlParams.get('id');
            
            if (!clubId) {
                alert('ID Club non specificato.');
                window.location.href = 'lista-club.html';
                return;
            }

            try {
                // Carica Dati Club
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                const clubs = data.record.clubs || [];
                
                currentClubData = clubs.find(c => c.id === clubId);
                
                if (!currentClubData) {
                    alert('Club non trovato.');
                    window.location.href = 'lista-club.html';
                    return;
                }

                // Popola Campi
                document.getElementById('club-id').value = currentClubData.id;
                document.getElementById('name').value = currentClubData.name || '';
                document.getElementById('tag').value = currentClubData.tag || '';
                document.getElementById('stadium').value = currentClubData.stadium || '';
                document.getElementById('color1').value = currentClubData.colors?.primary || '#f5a623';
                document.getElementById('color1-text').value = currentClubData.colors?.primary || '#f5a623';
                document.getElementById('color2').value = currentClubData.colors?.secondary || '#1a1a24';
                document.getElementById('color2-text').value = currentClubData.colors?.secondary || '#1a1a24';

                // Popola Logo
                if (currentClubData.logo) {
                    logoBase64 = currentClubData.logo;
                    document.getElementById('preview-img').src = logoBase64;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('placeholder-icon').style.display = 'none';
                }

                // Carica Utenti per Capitano
                const usersRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_USERS}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const usersData = await usersRes.json();
                const users = usersData.record.users || [];
                
                const select = document.getElementById('captain');
                select.innerHTML = '<option value="">-- Seleziona Utente --</option>';
                users.forEach(u => {
                    select.innerHTML += `<option value="${u.id}">${u.nomeEA} (${u.gamertag})</option>`;
                });
                
                // Imposta Capitano corrente
                document.getElementById('captain').value = currentClubData.captain || '';

            } catch (e) {
                console.error(e);
                alert("Errore caricamento dati.");
            }
        }

        loadClubData();

        // Preview Logo
        document.getElementById('logo-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    logoBase64 = ev.target.result;
                    document.getElementById('preview-img').src = logoBase64;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('placeholder-icon').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // Sync Color Inputs
        ['color1', 'color2'].forEach(id => {
            const color = document.getElementById(id);
            const text = document.getElementById(id + '-text');
            color.oninput = () => text.value = color.value;
            text.oninput = () => { if(/^#[0-9A-Fa-f]{6}$/.test(text.value)) color.value = text.value; };
        });

        // Submit Modifiche
        document.getElementById('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio...';

            try {
                // Leggi lista attuale
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                let clubs = data.record.clubs || [];

                // Trova indice
                const index = clubs.findIndex(c => c.id === document.getElementById('club-id').value);
                if (index === -1) throw new Error("Club non trovato.");

                // Aggiorna oggetto
                clubs[index] = {
                    ...clubs[index], // Mantiene dati non modificati come createdAt
                    name: document.getElementById('name').value,
                    tag: document.getElementById('tag').value.toUpperCase(),
                    logo: logoBase64 || clubs[index].logo, // Mantiene vecchio logo se non cambiato
                    captain: document.getElementById('captain').value || null,
                    colors: { 
                        primary: document.getElementById('color1').value, 
                        secondary: document.getElementById('color2').value 
                    },
                    stadium: document.getElementById('stadium').value,
                    updatedAt: new Date().toISOString()
                };

                // Salva
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ clubs: clubs })
                });

                alert('Modifiche salvate!');
                window.location.href = 'lista-club.html';

            } catch (err) {
                console.error(err);
                alert("Errore durante il salvataggio.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Salva Modifiche';
            }
        });

        // Logout Admin
        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('admin');
            window.location.href = 'accesso-admin.html';
        });
    </script>
</body>
</html>
