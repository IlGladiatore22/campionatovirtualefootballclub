<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVFC ADMIN - Crea Competizione</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        body { background: var(--bg-primary); }
        .form-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .form-section h3 { margin-bottom: 15px; color: var(--accent-gold); font-size: 1.1rem; }
        
        /* Stili per l'upload immagine */
        .image-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
        }
        .image-upload-area:hover {
            border-color: var(--accent-orange);
            background: rgba(255,255,255,0.05);
        }
        .image-upload-area i {
            font-size: 2rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: block;
        }
        .image-upload-area p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }
        #imagePreview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        .remove-image-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="dashboard.html" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></a>
                <span class="site-name" style="color: var(--accent-orange);">Crea Competizione</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="max-width: 600px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <h2 class="mb-3 text-center"><i class="fas fa-trophy text-gold"></i> Nuova Competizione</h2>
                    
                    <form id="form">
                        <div class="form-section">
                            <h3><i class="fas fa-info-circle"></i> Informazioni Generali</h3>
                            
                            <!-- CAMPO IMMAGINE -->
                            <div class="input-group">
                                <label class="input-label">Foto Competizione</label>
                                <div class="image-upload-area" id="uploadArea">
                                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                                    <button type="button" class="remove-image-btn" id="removeBtn"><i class="fas fa-times"></i></button>
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <p id="uploadText">Clicca o trascina un'immagine</p>
                                    <img id="imagePreview" src="#" alt="Preview">
                                </div>
                            </div>

                            <div class="input-group">
                                <label class="input-label">Nome Competizione *</label>
                                <input type="text" id="nome" class="input-field" placeholder="Es. Champions League FC27" required>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Descrizione</label>
                                <textarea id="descrizione" class="input-field" rows="3" placeholder="Descrizione breve..."></textarea>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Stato</label>
                                <select id="stato" class="input-field">
                                    <option value="aperta">Iscrizioni Aperte</option>
                                    <option value="chiusa">Iscrizioni Chiuse</option>
                                    <option value="in_corso">In Corso</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3><i class="fas fa-cogs"></i> Impostazioni</h3>
                            <div class="grid-2">
                                <div class="input-group">
                                    <label class="input-label">Max Squadre</label>
                                    <input type="number" id="max_squadre" class="input-field" placeholder="Es. 16" min="2">
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Costo Iscrizione (Crediti)</label>
                                    <input type="number" id="costo" class="input-field" placeholder="0" min="0">
                                </div>
                            </div>
                            <div class="grid-2">
                                <div class="input-group">
                                    <label class="input-label">Data Inizio</label>
                                    <input type="date" id="data_inizio" class="input-field">
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Ora Inizio</label>
                                    <input type="time" id="ora_inizio" class="input-field">
                                </div>
                            </div>
                        </div>

                        <div class="form-section" style="border-bottom: none;">
                            <h3><i class="fas fa-gift"></i> Premi</h3>
                            <div class="input-group">
                                <label class="input-label">Lista Premi (uno per riga)</label>
                                <textarea id="premi" class="input-field" rows="3" placeholder="1° Posto: 500 Crediti&#10;2° Posto: 200 Crediti"></textarea>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3" style="background: var(--accent-orange);">Crea Competizione</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURAZIONE JSONBIN
        // ==========================================
        const BIN_ID_COMPETIZIONI = '6a2d7dcbf5f4af5e29ec21b0';
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        // ==========================================
        // CONTROLLO SESSIONE ADMIN
        // ==========================================
        const admin = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!admin || !admin.isAdmin) {
            window.location.href = 'accesso-admin.html';
        }

        // ==========================================
        // FUNZIONE COMPRESSIONE IMMAGINE
        // ==========================================
        function comprimiImmagine(file, larghezzaMax, altezzaMax, qualita) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width;
                        let h = img.height;

                        if (w > h) {
                            if (w > larghezzaMax) { h *= larghezzaMax / w; w = larghezzaMax; }
                        } else {
                            if (h > altezzaMax) { w *= altezzaMax / h; h = altezzaMax; }
                        }
                        
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', qualita));
                    };
                    img.onerror = (err) => reject(err);
                    img.src = event.target.result;
                };
                reader.onerror = (err) => reject(err);
                reader.readAsDataURL(file);
            });
        }

        // ==========================================
        // GESTIONE IMMAGINE
        // ==========================================
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadText = document.getElementById('uploadText');
        const removeBtn = document.getElementById('removeBtn');
        let savedImageData = '';

        uploadArea.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                try {
                    // Comprimi l'immagine prima di salvarla (max 400px per competizioni)
                    savedImageData = await comprimiImmagine(file, 400, 400, 0.7);
                    imagePreview.src = savedImageData;
                    imagePreview.style.display = 'block';
                    removeBtn.style.display = 'block';
                    uploadText.style.display = 'none';
                    uploadArea.querySelector('i').style.display = 'none';
                } catch (err) {
                    console.error("Errore elaborazione immagine", err);
                    alert("Impossibile caricare l'immagine.");
                }
            }
        });

        removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            savedImageData = '';
            imageInput.value = '';
            imagePreview.src = '#';
            imagePreview.style.display = 'none';
            removeBtn.style.display = 'none';
            uploadText.style.display = 'block';
            uploadArea.querySelector('i').style.display = 'block';
        });

        // ==========================================
        // SUBMIT FORM
        // ==========================================
        document.getElementById('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creazione...';

            try {
                // 1. Leggi competizioni esistenti
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_COMPETIZIONI}/latest`, {
                    headers: { 'X-Master-Key': API_KEY },
                    cache: 'no-store'
                });
                
                if (res.status === 404) throw new Error("Bin Competizioni non trovato. Crealo su JSONBin.");
                if (!res.ok) throw new Error("Errore lettura database.");
                
                const data = await res.json();
                let listaCompetizioni = data.record.competizioni || [];

                // 2. Crea oggetto competizione in italiano
                const nuovaCompetizione = {
                    id: 'comp_' + Date.now(),
                    nome: document.getElementById('nome').value,
                    descrizione: document.getElementById('descrizione').value,
                    stato: document.getElementById('stato').value,
                    immagine: savedImageData,
                    max_squadre: parseInt(document.getElementById('max_squadre').value) || null,
                    costo: parseInt(document.getElementById('costo').value) || 0,
                    data_inizio: document.getElementById('data_inizio').value,
                    ora_inizio: document.getElementById('ora_inizio').value,
                    premi: document.getElementById('premi').value,
                    club_registrati: [],
                    classifica: {},
                    creato_il: new Date().toISOString()
                };

                // 3. Aggiungi e salva
                listaCompetizioni.push(nuovaCompetizione);
                
                const saveRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_COMPETIZIONI}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ "competizioni": listaCompetizioni })
                });

                if (saveRes.status === 403) throw new Error("Errore 403: Permesso negato.");
                if (!saveRes.ok) throw new Error("Errore salvataggio.");

                alert('Competizione creata con successo!');
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error(err);
                alert("Errore: " + err.message);
                btn.disabled = false;
                btn.innerHTML = 'Crea Competizione';
            }
        });

        // ==========================================
        // LOGOUT
        // ==========================================
        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('admin');
            window.location.href = 'accesso-admin.html';
        });
    </script>
</body>
</html>
