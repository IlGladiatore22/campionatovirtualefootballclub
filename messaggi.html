
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Messaggi</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../estetica/style.css">
    <link rel="stylesheet" href="../estetica/animations.css">
    <link rel="stylesheet" href="../estetica/components.css">
    <style>html, body { height: auto; min-height: 100vh; overflow-y: auto; }</style>
</head>
<body>
    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-container"><div class="logo">FC</div><span class="site-name">FC27</span></div>
            </div>
            <div class="header-right">
                <button class="header-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </header>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="overlay"></div>

        <!-- SIDEBAR COMPLETA STANDARD -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container"><div class="logo">FC</div><span class="site-name">FC27</span></div>
                <button class="sidebar-close" id="close-btn"><i class="fas fa-times"></i></button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Menu Principale</div>
                    <a href="home.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
                    <a href="competizioni.html" class="nav-link"><i class="fas fa-trophy"></i><span>Competizioni</span></a>
                    <a href="tornei.html" class="nav-link"><i class="fas fa-medal"></i><span>Tornei</span></a>
                    <a href="club.html" class="nav-link"><i class="fas fa-users"></i><span>Club</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Comunicazioni</div>
                    <a href="messaggi.html" class="nav-link active"><i class="fas fa-envelope"></i><span>Messaggi</span></a>
                    <a href="notifiche.html" class="nav-link"><i class="fas fa-bell"></i><span>Notifiche</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Account</div>
                    <a href="profilo.html" class="nav-link"><i class="fas fa-user"></i><span>Profilo</span></a>
                    <a href="impostazioni.html" class="nav-link"><i class="fas fa-cog"></i><span>Impostazioni</span></a>
                </div>
                <div class="nav-section" id="admin-nav" style="display: none;">
                    <div class="nav-section-title">Amministrazione</div>
                    <a href="admin/dashboard.html" class="nav-link" style="color: var(--accent-orange);"><i class="fas fa-shield-alt"></i><span>Dashboard Admin</span></a>
                </div>
                <div class="nav-section" id="guest-admin-nav">
                     <div class="nav-section-title">Staff</div>
                     <a href="admin/accesso-admin.html" class="nav-link"><i class="fas fa-key"></i><span>Accesso Admin</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Info</div>
                    <a href="regolamento.html" class="nav-link"><i class="fas fa-book"></i><span>Regolamento</span></a>
                    <a href="faq.html" class="nav-link"><i class="fas fa-question-circle"></i><span>FAQ</span></a>
                    <button id="logout-btn" class="nav-link" style="width: 100%; background: none; border: none; cursor: pointer; text-align: left;"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
                </div>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <div class="container" style="padding-top: 30px;">
                <h1 class="mb-3">Messaggi</h1>

                <!-- Tabs -->
                <div class="tabs-container mb-4">
                    <button class="tab-btn active" data-tab="compose"><i class="fas fa-paper-plane"></i> Nuovo</button>
                    <button class="tab-btn" data-tab="inbox"><i class="fas fa-inbox"></i> Ricevuti</button>
                    <button class="tab-btn" data-tab="sent"><i class="fas fa-paper-plane"></i> Inviati</button>
                </div>

                <!-- Compose Tab -->
                <div id="tab-compose" class="tab-content active">
                    <div class="card">
                        <h3 class="mb-3"><i class="fas fa-edit text-gold"></i> Nuovo Messaggio</h3>
                        
                        <div class="input-group">
                            <label class="input-label">Destinatario</label>
                            <select id="recipient-select" class="input-field">
                                <option value="">Seleziona destinatario...</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Oggetto</label>
                            <input type="text" id="subject" class="input-field" placeholder="Oggetto del messaggio">
                        </div>

                        <div class="input-group">
                            <label class="input-label">Messaggio</label>
                            <textarea id="message-text" class="input-field" rows="5" placeholder="Scrivi il tuo messaggio..."></textarea>
                        </div>

                        <button id="send-btn" class="btn btn-primary btn-block btn-large">
                            <i class="fas fa-paper-plane"></i> Invia Messaggio
                        </button>
                    </div>
                </div>

                <!-- Inbox Tab -->
                <div id="tab-inbox" class="tab-content" style="display: none;">
                    <div id="inbox-list"></div>
                    <div id="inbox-empty" class="empty-state" style="display: none;">
                        <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
                        <h3 class="empty-state-title">Posta vuota</h3>
                    </div>
                </div>

                <!-- Sent Tab -->
                <div id="tab-sent" class="tab-content" style="display: none;">
                    <div id="sent-list"></div>
                    <div id="sent-empty" class="empty-state" style="display: none;">
                        <div class="empty-state-icon"><i class="fas fa-paper-plane"></i></div>
                        <h3 class="empty-state-title">Nessun messaggio inviato</h3>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // =============================================
        // CONFIGURAZIONE ADMIN E DISCORD
        // =============================================
        const ADMIN_LIST = [
            { name: "Owner", discordId: "642283273623437332" }, // Modifica con il tuo ID
        ];
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1507816786823745586/Cinn-O8YcOUMeNaZbxFZ2SqJDQP9yoy9EyBfzrNyuK0wOtnyjgDvUwmZ0_7_P9HeO31T"; // Inserisci URL
        // =============================================

        // Sidebar Logic
        document.getElementById('menu-btn').addEventListener('click', () => { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').classList.add('active'); });
        document.getElementById('close-btn').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); });
        document.getElementById('overlay').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); });
        document.getElementById('logout-btn').addEventListener('click', () => { localStorage.removeItem('user'); localStorage.removeItem('auth_token'); window.location.href='home-non-loggato.html'; });

        // Auth
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) window.location.href = 'accesso.html';
        if (user && user.isAdmin) { document.getElementById('admin-nav').style.display = 'block'; document.getElementById('guest-admin-nav').style.display = 'none'; }

        // Tabs Logic
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).style.display = 'block';
            });
        });

        // Popola Destinatari
        const recipientSelect = document.getElementById('recipient-select');
        const adminGroup = document.createElement('optgroup');
        adminGroup.label = "Amministrazione";
        ADMIN_LIST.forEach((admin, index) => {
            const opt = document.createElement('option');
            opt.value = 'admin_' + index;
            opt.textContent = admin.name + " (Admin)";
            opt.dataset.discord = admin.discordId;
            adminGroup.appendChild(opt);
        });
        recipientSelect.appendChild(adminGroup);

        const users = JSON.parse(localStorage.getItem('fc27_users') || '[]');
        const userGroup = document.createElement('optgroup');
        userGroup.label = "Utenti Registrati";
        users.forEach(u => {
            if (u.id !== user.id) {
                const opt = document.createElement('option');
                opt.value = u.id;
                opt.textContent = u.nomeEA + " (" + u.gamertag + ")";
                opt.dataset.discord = u.discordId || '';
                userGroup.appendChild(opt);
            }
        });
        recipientSelect.appendChild(userGroup);

        // Load Messages
        const messages = JSON.parse(localStorage.getItem('fc27_messages') || '[]');
        
        // Inbox
        const inbox = messages.filter(m => m.toId === user.id || (user.discordId && m.toDiscordId === user.discordId));
        const inboxList = document.getElementById('inbox-list');
        if (inbox.length === 0) document.getElementById('inbox-empty').style.display = 'block';
        else {
            inbox.forEach(msg => {
                const card = document.createElement('div');
                card.className = 'notification-item animate-slideUp';
                card.innerHTML = `<div class="notification-icon"><i class="fas fa-envelope"></i></div><div class="notification-content"><div class="notification-title">${msg.subject}</div><p class="notification-text">Da: ${msg.fromName}</p><span class="notification-time">${new Date(msg.createdAt).toLocaleString('it-IT')}</span></div>`;
                card.addEventListener('click', () => alert(`Da: ${msg.fromName}\n\n${msg.message}`));
                inboxList.appendChild(card);
            });
        }

        // Sent
        const sent = messages.filter(m => m.from === user.id);
        const sentList = document.getElementById('sent-list');
        if (sent.length === 0) document.getElementById('sent-empty').style.display = 'block';
        else {
            sent.forEach(msg => {
                const card = document.createElement('div');
                card.className = 'notification-item animate-slideUp';
                card.innerHTML = `<div class="notification-icon"><i class="fas fa-paper-plane"></i></div><div class="notification-content"><div class="notification-title">${msg.subject}</div><p class="notification-text">A: ${msg.toName}</p><span class="notification-time">${new Date(msg.createdAt).toLocaleString('it-IT')}</span></div>`;
                sentList.appendChild(card);
            });
        }

        // Send Message
        document.getElementById('send-btn').addEventListener('click', async function() {
            const selectedOpt = recipientSelect.options[recipientSelect.selectedIndex];
            const recipientValue = recipientSelect.value;
            const subject = document.getElementById('subject').value.trim();
            const text = document.getElementById('message-text').value.trim();

            if (!recipientValue) { alert('Seleziona un destinatario'); return; }
            if (!subject || !text) { alert('Compila oggetto e messaggio'); return; }

            const discordId = selectedOpt.dataset.discord;
            const recipientName = selectedOpt.textContent;

            // 1. Salva in locale
            messages.push({
                id: 'msg_' + Date.now(),
                from: user.id,
                fromName: user.nomeEA,
                toId: recipientValue,
                toName: recipientName,
                toDiscordId: discordId,
                subject: subject,
                message: text,
                createdAt: new Date().toISOString()
            });
            localStorage.setItem('fc27_messages', JSON.stringify(messages));

            // 2. Invia a Discord
            if (discordId && DISCORD_WEBHOOK_URL.includes("https://discord.com/api/webhooks/")) {
                try {
                    const content = `**Nuovo Messaggio da FC27**\n\n**Da:** ${user.nomeEA}\n**Oggetto:** ${subject}\n\n${text}\n\n<@${discordId}>`;
                    await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: content }) });
                    alert('Messaggio inviato e notificato su Discord!');
                } catch (err) {
                    alert('Messaggio salvato, ma invio Discord fallito.');
                }
            } else {
                alert('Messaggio inviato!');
            }
            document.getElementById('subject').value = ''; document.getElementById('message-text').value = '';
            document.querySelector('[data-tab="sent"]').click();
        });
    </script>
</body>
</html>
