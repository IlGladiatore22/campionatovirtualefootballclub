<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Crea Competizione</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../estetica/style.css">
    <link rel="stylesheet" href="../estetica/animations.css">
    <link rel="stylesheet" href="../estetica/components.css">
    <style>html, body { height: auto; min-height: 100vh; overflow-y: auto; }</style>
</head>
<body>
    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <a href="competizioni.html" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></a>
                <span class="site-name">Crea Competizione</span>
            </div>
        </header>

        <!-- Main -->
        <main class="main-content">
            <div class="container" style="max-width: 600px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <h2 class="mb-3"><i class="fas fa-trophy text-gold"></i> Nuova Competizione</h2>

                    <form id="create-form">
                        <div class="input-group">
                            <label class="input-label">Nome Competizione</label>
                            <input type="text" id="name" class="input-field" placeholder="Es. Champions League FC27" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Descrizione</label>
                            <textarea id="description" class="input-field" rows="3" placeholder="Descrizione della competizione"></textarea>
                        </div>

                        <div class="grid-2">
                            <div class="input-group">
                                <label class="input-label">Costo Iscrizione (Crediti)</label>
                                <input type="number" id="cost" class="input-field" value="0" min="0">
                            </div>
                            <div class="input-group">
                                <label class="input-label">Max Squadre</label>
                                <input type="number" id="maxTeams" class="input-field" value="32" min="2">
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Premi (descrizione)</label>
                            <textarea id="prizes" class="input-field" rows="2" placeholder="Es. 1°: 500 crediti, 2°: 300 crediti"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3">
                            <i class="fas fa-plus"></i> Crea Competizione
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Check admin
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user || !user.isAdmin) {
            window.location.href = 'home.html';
        }

        document.getElementById('create-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const description = document.getElementById('description').value.trim();
            const cost = parseInt(document.getElementById('cost').value) || 0;
            const maxTeams = parseInt(document.getElementById('maxTeams').value) || 32;
            const prizes = document.getElementById('prizes').value.trim();

            if (!name) {
                alert('Inserisci un nome per la competizione');
                return;
            }

            const newComp = {
                id: 'comp_' + Date.now(),
                name: name,
                description: description,
                cost: cost,
                maxTeams: maxTeams,
                prizes: prizes,
                status: 'aperta', // aperta, chiusa, in_corso
                registeredClubs: [],
                standings: [], // Generato dinamicamente
                createdAt: new Date().toISOString(),
                createdBy: user.id
            };

            // Salva
            const competitions = JSON.parse(localStorage.getItem('fc27_competitions') || '[]');
            competitions.push(newComp);
            localStorage.setItem('fc27_competitions', JSON.stringify(competitions));

            alert('Competizione creata con successo!');
            window.location.href = 'competizioni.html';
        });
    </script>
</body>
</html>
