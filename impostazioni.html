<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Impostazioni</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../estetica/style.css">
    <link rel="stylesheet" href="../estetica/components.css">
    <style>html, body { height: auto; min-height: 100vh; overflow-y: auto; }
    .setting-item { padding: 20px 0; border-bottom: 1px solid var(--border-color); }
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-tertiary); transition: .4s; border-radius: 34px; border: 1px solid var(--border-color); }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 3px; background-color: var(--text-muted); transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--accent-gold); border-color: var(--accent-gold); }
    input:checked + .slider:before { transform: translateX(22px); background-color: var(--bg-primary); }
    body.light-theme { --bg-primary: #f0f2f5; --bg-secondary: #ffffff; --text-primary: #1a1a1a; --text-secondary: #555; --border-color: #e0e0e0; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left"><div class="logo-container"><div class="logo">FC</div><span class="site-name">FC27</span></div></div>
            <div class="header-right"><button class="header-btn" id="menu-btn"><i class="fas fa-bars"></i></button></div>
        </header>

        <!-- SIDEBAR STANDARD -->
        <div class="sidebar-overlay" id="overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><div class="logo-container"><div class="logo">FC</div><span class="site-name">FC27</span></div><button class="sidebar-close" id="close-btn"><i class="fas fa-times"></i></button></div>
            <nav class="sidebar-nav">
                <div class="nav-section"><div class="nav-section-title">Menu</div><a href="home.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a><a href="profilo.html" class="nav-link"><i class="fas fa-user"></i><span>Profilo</span></a><a href="impostazioni.html" class="nav-link active"><i class="fas fa-cog"></i><span>Impostazioni</span></a></div>
                <div class="nav-section" id="admin-nav" style="display: none;"><div class="nav-section-title">Admin</div><a href="admin/dashboard.html" class="nav-link" style="color: var(--accent-orange);"><i class="fas fa-shield-alt"></i><span>Dashboard Admin</span></a></div>
                <div class="nav-section" id="guest-admin-nav"><div class="nav-section-title">Staff</div><a href="admin/accesso-admin.html" class="nav-link"><i class="fas fa-key"></i><span>Accesso Admin</span></a></div>
                <div class="nav-section"><div class="nav-section-title">Info</div><button id="logout-btn" class="nav-link" style="width: 100%; background: none; border: none; cursor: pointer; text-align: left;"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button></div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="container" style="padding-top: 30px; max-width: 700px;">
                <h1 class="mb-3">Impostazioni</h1>

                <!-- Discord ID -->
                <div class="card animate-slideUp">
                    <h4 class="mb-2"><i class="fab fa-discord text-gold"></i> Collega Discord</h4>
                    <div class="setting-item">
                        <span class="setting-desc">Inserisci il tuo ID per ricevere notifiche.</span>
                        <div class="flex gap-2">
                            <input type="text" id="discord-id" class="input-field" placeholder="123456789012345678">
                            <button id="save-discord" class="btn btn-primary">Salva</button>
                        </div>
                    </div>
                </div>

                <!-- Password -->
                <div class="card mt-4 animate-slideUp">
                    <h4 class="mb-2"><i class="fas fa-lock text-gold"></i> Sicurezza</h4>
                    <div class="setting-item">
                        <input type="password" id="old-pass" class="input-field mb-2" placeholder="Password Attuale">
                        <input type="password" id="new-pass" class="input-field mb-2" placeholder="Nuova Password">
                        <input type="password" id="conf-pass" class="input-field mb-2" placeholder="Conferma Password">
                        <button id="change-pass-btn" class="btn btn-primary">Aggiorna Password</button>
                    </div>
                </div>

                <!-- Tema -->
                <div class="card mt-4 animate-slideUp">
                    <h4 class="mb-2"><i class="fas fa-palette text-gold"></i> Aspetto</h4>
                    <div class="setting-item flex justify-between items-center">
                        <span>Tema Chiaro</span>
                        <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
                    </div>
                </div>
                
                <!-- Danger Zone -->
                <div class="card mt-4 animate-slideUp" style="border-color: var(--accent-red);">
                    <h4 class="mb-2" style="color: var(--accent-red);"><i class="fas fa-exclamation-triangle"></i> Zona Pericolosa</h4>
                    <button id="delete-acc-btn" class="btn" style="background: var(--accent-red); color: white;">Elimina Account</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Sidebar Logic
        document.getElementById('menu-btn').addEventListener('click', () => { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').classList.add('active'); });
        document.getElementById('close-btn').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); });
        document.getElementById('overlay').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); });
        document.getElementById('logout-btn').addEventListener('click', () => { localStorage.clear(); window.location.href='home-non-loggato.html'; });

        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) window.location.href = 'accesso.html';
        if (user.isAdmin) { document.getElementById('admin-nav').style.display = 'block'; document.getElementById('guest-admin-nav').style.display = 'none'; }

        // Discord
        if (user.discordId) document.getElementById('discord-id').value = user.discordId;
        document.getElementById('save-discord').addEventListener('click', () => {
            user.discordId = document.getElementById('discord-id').value;
            localStorage.setItem('user', JSON.stringify(user));
            const users = JSON.parse(localStorage.getItem('fc27_users') || '[]');
            const idx = users.findIndex(u => u.id === user.id);
            if(idx !== -1) users[idx].discordId = user.discordId;
            localStorage.setItem('fc27_users', JSON.stringify(users));
            alert('Salvato!');
        });

        // Password
        document.getElementById('change-pass-btn').addEventListener('click', () => {
            const o = document.getElementById('old-pass').value;
            const n = document.getElementById('new-pass').value;
            const c = document.getElementById('conf-pass').value;
            if(!o || !n || !c) return alert('Compila tutto');
            if(o !== user.password) return alert('Password attuale errata');
            if(n !== c) return alert('Le nuove non coincidono');
            user.password = n;
            localStorage.setItem('user', JSON.stringify(user));
            const users = JSON.parse(localStorage.getItem('fc27_users') || '[]');
            const idx = users.findIndex(u => u.id === user.id);
            if(idx !== -1) users[idx].password = n;
            localStorage.setItem('fc27_users', JSON.stringify(users));
            alert('Password cambiata!');
        });

        // Theme
        if(localStorage.getItem('theme') === 'light') { document.body.classList.add('light-theme'); document.getElementById('theme-toggle').checked = true; }
        document.getElementById('theme-toggle').addEventListener('change', function() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', this.checked ? 'light' : 'dark');
        });

        // Delete
        document.getElementById('delete-acc-btn').addEventListener('click', () => {
            if(confirm('Sicuro?')) {
                let users = JSON.parse(localStorage.getItem('fc27_users') || '[]');
                users = users.filter(u => u.id !== user.id);
                localStorage.setItem('fc27_users', JSON.stringify(users));
                localStorage.removeItem('user');
                location.href = 'home-non-loggato.html';
            }
        });
    </script>
</body>
</html>
