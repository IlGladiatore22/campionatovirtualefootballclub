<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVFC ADMIN - Gestione Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css?v=2">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        .club-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }
        .club-item:hover {
            border-color: var(--accent-gold);
        }
        .club-logo-small {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }
        .club-logo-small img { width: 100%; height: 100%; object-fit: cover; }
        .club-logo-small i { color: var(--text-muted); font-size: 1.5rem; }
        .club-details { flex: 1; }
        .club-actions { display: flex; gap: 10px; flex-shrink: 0; }
        .btn-modify { background: var(--accent-blue); color: white; }
        .btn-delete { background: var(--accent-red); color: white; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="dashboard.html" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></a>
                <span class="site-name" style="color: var(--accent-orange);">Gestione Club</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="padding: 30px 20px;">
                <div class="admin-section animate-slideUp">
                    <div class="section-header">
                        <h3 class="section-title"><i class="fas fa-shield-alt"></i> Club Registrati</h3>
                        <button class="btn btn-small btn-secondary" onclick="loadClubs()"><i class="fas fa-sync-alt"></i> Aggiorna</button>
                    </div>
                    <div id="clubs-container">
                        <p style="text-align:center; color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Caricamento...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // === CONFIGURAZIONE JSONBIN ===
        const BIN_ID_CLUBS = '6a2bea3dda38895dfeb4410a';
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        // Controllo Admin
        const admin = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!admin || !admin.isAdmin) window.location.href = 'accesso-admin.html';

        async function loadClubs() {
            const container = document.getElementById('clubs-container');
            container.innerHTML = '<p style="text-align:center; color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Caricamento...</p>';
            
            try {
                // CACHE BUSTER per aggiornamento immediato
                const ts = '?t=' + new Date().getTime();
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest${ts}`, {
                    headers: { 'X-Master-Key': API_KEY },
                    cache: 'no-store'
                });
                
                const data = await res.json();
                // LEGGIAMO "club" (SINGOLARE) come salvato nel nuovo form
                const clubs = data.record.club || [];

                container.innerHTML = '';

                if (clubs.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Nessun club trovato.</p>';
                    return;
                }

                clubs.forEach(club => {
                    const logoContent = club.logo 
                        ? `<img src="${club.logo}" alt="${club.nome || club.name}">` 
                        : `<i class="fas fa-shield-alt"></i>`;

                    // Usiamo i campi in Italiano con fallback in inglese
                    const nomeClub = club.nome || club.name || 'Senza Nome';
                    const stadioClub = club.stadio || club.stadium || '-';

                    const div = document.createElement('div');
                    div.className = 'club-item';
                    div.innerHTML = `
                        <div class="club-logo-small">${logoContent}</div>
                        <div class="club-details">
                            <h4 style="margin:0; color:var(--text-primary);">${nomeClub}</h4>
                            <p style="margin:0; color:var(--text-muted); font-size:0.8rem;">
                                Tag: ${club.tag || '-'} | Stadio: ${stadioClub}
                            </p>
                        </div>
                        <div class="club-actions">
                            <button class="btn btn-small btn-modify" onclick="editClub('${club.id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-small btn-delete" onclick="deleteClub('${club.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    container.appendChild(div);
                });

            } catch (e) {
                console.error(e);
                container.innerHTML = '<p style="color:red; text-align:center;">Errore caricamento.</p>';
            }
        }

        async function deleteClub(id) {
            if(!confirm("Sei sicuro di voler eliminare questo club?")) return;

            try {
                // 1. Leggi
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, { headers: { 'X-Master-Key': API_KEY } });
                const data = await res.json();
                // Leggiamo la lista "club"
                let clubs = data.record.club || [];
                
                // 2. Filtra
                const newClubs = clubs.filter(c => c.id !== id);

                // 3. Salva (ripristinando la struttura corretta)
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify({ "club": newClubs }) // Salviamo con chiave "club"
                });

                alert('Club eliminato!');
                loadClubs(); // Ricarica lista
            } catch (e) {
                console.error(e);
                alert("Errore durante l'eliminazione.");
            }
        }

        function editClub(id) {
            window.location.href = `modifica-club.html?id=${id}`;
        }

        loadClubs();

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('admin');
            window.location.href = 'accesso-admin.html';
        });
    </script>
</body>
</html>
