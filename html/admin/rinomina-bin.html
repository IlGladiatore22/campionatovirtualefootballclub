<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Strumento Rinomina Bin</title>
    <style>
        body { background: #1a1a24; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .box { background: #2d2d44; padding: 30px; border-radius: 10px; }
        button { background: #9b59b6; color: white; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        button:hover { background: #8e44ad; }
        input { padding: 10px; width: 100%; box-sizing: border-box; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔧 Rinomina Bin Tornei</h2>
        <p>Questo strumento serve solo a scrivere il nome "Tornei" sul database.</p>
        
        <label>Bin ID:</label>
        <input type="text" id="binId" value="6a2da647da38895dfebb4797">
        
        <label>Master Key:</label>
        <input type="text" id="apiKey" value="$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S">
        
        <br><br>
        <button onclick="rinomina()">✏️ Imposta Nome a "Tornei"</button>
        
        <p id="status" style="margin-top:20px; color: #2ecc71;"></p>
    </div>

    <script>
        async function rinomina() {
            const btn = document.querySelector('button');
            const binId = document.getElementById('binId').value;
            const apiKey = document.getElementById('apiKey').value;
            const status = document.getElementById('status');

            btn.disabled = true;
            status.textContent = "Invio comando...";
            status.style.color = "#f1c40f";

            try {
                // 1. Prima leggiamo i dati attuali per non cancellarli
                const getRes = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                    headers: { 'X-Master-Key': apiKey }
                });
                const data = await getRes.json();
                const content = data.record;

                // 2. Risalviamo i dati aggiungendo l'header X-Bin-Name
                const saveRes = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': apiKey,
                        'X-Bin-Name': 'Tornei' // <--- QUESTO CAMBIA IL NOME
                    },
                    body: JSON.stringify(content)
                });

                if (saveRes.ok) {
                    status.textContent = "Fatto! Ricarica la pagina di JSONBin.io per vedere 'Tornei'.";
                    status.style.color = "#2ecc71";
                } else {
                    status.textContent = "Errore: " + saveRes.statusText;
                    status.style.color = "red";
                }

            } catch(e) {
                status.textContent = "Errore connessione: " + e.message;
                status.style.color = "red";
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
