<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVFC ADMIN - Crea Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css?v=2">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        .logo-preview { width: 100px; height: 100px; border-radius: 50%; background: var(--bg-tertiary); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed var(--border-color); cursor: pointer; transition: all 0.3s; }
        .logo-preview:hover { border-color: var(--accent-gold); }
        .logo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .logo-preview i { font-size: 2rem; color: var(--text-muted); }
        .color-sync { display: flex; gap: 10px; align-items: center; }
        .color-sync input[type="color"] { width: 50px; height: 40px; padding: 0; border: none; cursor: pointer; background: none; }
        .color-sync input[type="text"] { flex: 1; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="dashboard.html" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></a>
                <span class="site-name" style="color: var(--accent-orange);">Crea Club</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="max-width: 600px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <h2 class="mb-3 text-center"><i class="fas fa-shield-alt text-gold"></i> Nuovo Club</h2>
                    
                    <div class="logo-preview" onclick="document.getElementById('logo-input').click()">
                        <i class="fas fa-camera" id="placeholder-icon"></i>
                        <img id="preview-img" src="" style="display: none;">
                    </div>
                    <input type="file" id="logo-input" accept="image/*" style="display: none;">
                    
                    <form id="form">
                        <div class="input-group">
                            <label class="input-label">Nome Club *</label>
                            <input type="text" id="nome" class="input-field" placeholder="Es. FC Warriors" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Abbreviazione (Tag)</label>
                            <input type="text" id="tag" class="input-field" placeholder="FCW" maxlength="4">
                        </div>

                        <div class="input-group">
                            <label class="input-label">Seleziona Capitano</label>
                            <select id="capitano" class="input-field">
                                <option value="">-- Caricamento utenti... --</option>
                            </select>
                        </div>

                        <div class="grid-2">
                            <div class="input-group">
                                <label class="input-label">Colore Primario</label>
                                <div class="color-sync">
                                    <input type="color" id="colore1" value="#f5a623">
                                    <input type="text" id="colore1-testo" class="input-field" value="#f5a623" maxlength="7">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Colore Secondario</label>
                                <div class="color-sync">
                                    <input type="color" id="colore2" value="#1a1a24">
                                    <input type="text" id="colore2-testo" class="input-field" value="#1a1a24" maxlength="7">
                                </div>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Stadio</label>
                            <input type="text" id="stadio" class="input-field" placeholder="Nome stadio">
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3" style="background: var(--accent-orange);">Crea Club</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURAZIONE (CORRETTA)
        // ==========================================
        
        // ID BIN UTENTI (Inserito dal tuo codice precedente)
        const BIN_ID_UTENTI = '6a2ae33cda38895dfeaee508'; 
        
        // !!! IMPORTANTE !!!
        // Se hai creato un NUOVO bin per i club, incolla qui sotto l'ID nuovo.
        // Se usi ancora il vecchio, lascia questo, ma ricorda di svuotarlo e metterci {"club": []}
        const BIN_ID_CLUB = '6a2bea3dda38895dfeb4410a'; 
        
        const CHIAVE_MASTER = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        // ==========================================
        // CONTROLLO ADMIN
        // ==========================================
        const admin = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!admin || !admin.isAdmin) {
            window.location.href = 'accesso-admin.html';
        }

        // ==========================================
        // FUNZIONI UTILITA'
        // ==========================================
        function comprimiImmagine(file, larghezzaMax, altezzaMax, qualita) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width;
                        let h = img.height;

                        if (w > h) {
                            if (w > larghezzaMax) { h *= larghezzaMax / w; w = larghezzaMax; }
                        } else {
                            if (h > altezzaMax) { w *= altezzaMax / h; h = altezzaMax; }
                        }
                        
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', qualita));
                    };
                    img.onerror = (err) => reject(err);
                    img.src = event.target.result;
                };
                reader.onerror = (err) => reject(err);
                reader.readAsDataURL(file);
            });
        }

        // ==========================================
        // CARICA UTENTI
        // ==========================================
        async function caricaUtenti() {
            const select = document.getElementById('capitano');
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_UTENTI}/latest`, {
                    headers: { 'X-Master-Key': CHIAVE_MASTER },
                    cache: 'no-store'
                });
                if (!res.ok) throw new Error("Errore caricamento");
                
                const data = await res.json();
                const utenti = data.record.users || [];
                
                select.innerHTML = '<option value="">-- Seleziona Utente --</option>';
                utenti.forEach(u => {
                    select.innerHTML += `<option value="${u.id}">${u.nomeEA} (${u.gamertag})</option>`;
                });
            } catch (e) {
                console.error(e);
                select.innerHTML = '<option value="">Errore DB</option>';
            }
        }
        caricaUtenti();

        // ==========================================
        // GESTIONE LOGO
        // ==========================================
        let logoBase64 = '';
        document.getElementById('logo-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                try {
                    logoBase64 = await comprimiImmagine(file, 200, 200, 0.7);
                    document.getElementById('preview-img').src = logoBase64;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('placeholder-icon').style.display = 'none';
                } catch (err) {
                    console.error("Errore immagine", err);
                }
            }
        });

        // Sync Color Inputs
        ['colore1', 'colore2'].forEach(id => {
            const color = document.getElementById(id);
            const text = document.getElementById(id + '-testo');
            color.oninput = () => text.value = color.value;
            text.oninput = () => { if(/^#[0-9A-Fa-f]{6}$/.test(text.value)) color.value = text.value; };
        });

        // ==========================================
        // SUBMIT FORM
        // ==========================================
        document.getElementById('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio...';

            try {
                // 1. Scarica lista attuale
                const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUB}/latest`, {
                    headers: { 'X-Master-Key': CHIAVE_MASTER },
                    cache: 'no-store'
                });
                
                if (getRes.status === 404) throw new Error("Bin Club non trovato (404). Verifica l'ID nel codice.");
                if (getRes.status === 403) throw new Error("Bin Club privato (403). Verifica di essere loggato o usa un nuovo Bin.");
                if (!getRes.ok) throw new Error("Errore lettura database.");
                
                const dati = await getRes.json();
                let listaClub = dati.record.club || [];

                const idCapitano = document.getElementById('capitano').value;
                
                // 2. Crea oggetto
                const nuovoClub = {
                    id: 'club_' + Date.now(),
                    nome: document.getElementById('nome').value,
                    tag: document.getElementById('tag').value.toUpperCase(),
                    logo: logoBase64,
                    capitano: idCapitano || null,
                    membri: idCapitano ? [idCapitano] : [],
                    colori: {
                        primario: document.getElementById('colore1').value,
                        secondario: document.getElementById('colore2').value
                    },
                    stadio: document.getElementById('stadio').value,
                    formazione: '4-3-3',
                    tattiche: {},
                    schieramento: {},
                    richieste: [],
                    creato_il: new Date().toISOString()
                };

                // 3. Aggiungi e salva
                listaClub.push(nuovoClub);
                
                const saveRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUB}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': CHIAVE_MASTER
                    },
                    body: JSON.stringify({ "club": listaClub })
                });

                if (saveRes.status === 403) throw new Error("Errore 403: Non hai i permessi per scrivere su questo Bin.");
                if (!saveRes.ok) throw new Error("Errore salvataggio.");

                alert('Club creato con successo!');
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error(err);
                alert("Errore: " + err.message);
                btn.disabled = false;
                btn.innerHTML = 'Crea Club';
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('admin');
            window.location.href = 'accesso-admin.html';
        });
    </script>
</body>
</html>
