<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Gestione Club</title>
    
    <link rel="icon" type="image/png" href="../../estetica/logosito.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css">
    <link rel="stylesheet" href="../../estetica/animations.css">
    <link rel="stylesheet" href="../../estetica/components.css">
    
    <style>
        html, body { height: auto; min-height: 100vh; overflow-y: auto; }
        
        /* Header Design */
        .club-header-new {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }
        .club-logo-big {
            width: 90px; height: 90px; border-radius: 50%; background: var(--bg-tertiary);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 3px solid var(--accent-gold); margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .club-logo-big img { width: 100%; height: 100%; object-fit: cover; }
        .club-logo-big i { font-size: 2.5rem; color: var(--accent-gold); }
        
        .club-title { font-size: 1.9rem; font-weight: 700; color: #fff; margin: 0; }
        .club-subtitle { 
            font-size: 0.9rem; color: var(--text-muted); margin-top: 5px; display: flex; align-items: center; gap: 8px; 
        }
        .club-subtitle i { color: var(--accent-gold); }

        .badge-captain {
            background: var(--accent-gold); color: #000; padding: 4px 12px; border-radius: 15px;
            font-weight: 700; font-size: 0.75rem; margin-top: 8px; display: inline-flex; align-items: center; gap: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Navigation Tabs */
        .nav-tabs-container {
            display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        .nav-tab-btn {
            flex: 1; padding: 10px; border-radius: 8px; text-align: center;
            background: var(--bg-tertiary); color: var(--text-secondary); text-decoration: none;
            font-weight: 600; transition: all 0.2s; border: 1px solid transparent;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .nav-tab-btn:hover { background: #2a2f3a; color: #fff; }
        .nav-tab-btn.active {
            background: var(--accent-gold); color: #000; border-color: var(--accent-gold);
        }

        /* Stats Grid */
        .stats-grid-mod { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .stat-box-new {
            background: var(--bg-tertiary); padding: 15px; border-radius: 10px;
            text-align: center; border: 1px solid var(--border-color);
        }

        /* Member List */
        .member-item {
            display: flex; align-items: center; gap: 12px; padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;
        }
        .member-item:hover { background: rgba(255,255,255,0.03); }
        .member-avatar {
            width: 35px; height: 35px; border-radius: 50%; background: #2a2f3a;
            display: flex; align-items: center; justify-content: center; color: var(--accent-gold);
        }

        /* Admin Section */
        .admin-panel {
            background: rgba(245, 166, 35, 0.1); border: 1px solid var(--accent-gold);
            border-radius: 10px; padding: 15px; margin-bottom: 20px;
        }
        .request-item {
            background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="club.html" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></a>
                <div class="logo-container"><div class="logo">FC</div><span class="site-name">FC27</span></div>
            </div>
            <div class="header-right">
                <button class="header-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </header>
        
        <div id="overlay" class="sidebar-overlay"></div>
        
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header"><div class="logo-container"><div class="logo">FC</div><span class="site-name">FC27</span></div><button id="close-btn" class="sidebar-close"><i class="fas fa-times"></i></button></div>
            <nav class="sidebar-nav">
                <div class="nav-section"><div class="nav-section-title">Menu</div><a href="../home.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a><a href="club.html" class="nav-link active"><i class="fas fa-users"></i><span>Club</span></a></div>
                <div class="nav-section"><button id="logout-btn" class="nav-link" style="width: 100%; background: none; border: none; cursor: pointer; text-align: left;"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button></div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="container" style="padding-top: 20px;">
                
                <div id="loading-state" class="text-center"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Caricamento...</p></div>

                <div id="main-content" style="display: none;">
                    
                    <!-- HEADER CLUB -->
                    <div class="animate-slideUp">
                        <div class="club-header-new">
                            <div class="club-logo-big" id="club-logo"><i class="fas fa-shield-alt"></i></div>
                            <h1 id="club-name" class="club-title">Nome Club</h1>
                            <div id="club-stadium" class="club-subtitle">
                                <i class="fas fa-futbol"></i> <span>Stadio</span>
                            </div>
                            <span id="captain-badge" class="badge-captain" style="display:none;"><i class="fas fa-crown"></i> CAPITANO</span>
                        </div>
                    </div>

                    <!-- TABS NAVIGATION -->
                    <div class="nav-tabs-container animate-slideUp stagger-1">
                        <!-- Panoramica (Pagina Attuale) -->
                        <a href="#" class="nav-tab-btn active" onclick="return false;">
                            <i class="fas fa-users"></i> Panoramica Rosa
                        </a>
                        <!-- Formazione (Link a formazione.html) -->
                        <a id="link-formazione" href="#" class="nav-tab-btn">
                            <i class="fas fa-chalkboard"></i> Formazione
                        </a>
                    </div>

                    <!-- ADMIN PANEL (Solo Capitano) -->
                    <div id="admin-panel" class="admin-panel animate-slideUp" style="display:none;">
                        <h4 style="color: var(--accent-gold); margin-bottom: 10px;"><i class="fas fa-user-shield"></i> Gestione Richieste</h4>
                        <div id="requests-list"><p class="text-muted" style="margin:0;">Nessuna richiesta.</p></div>
                    </div>

                    <!-- STATS -->
                    <div class="stats-grid mt-0 animate-slideUp stagger-2 stats-grid-mod">
                        <div class="stat-box-new">
                            <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Membri</div>
                            <div id="member-count" style="font-size: 1.8rem; font-weight: 700; color: var(--accent-gold);">0</div>
                        </div>
                        <div class="stat-box-new">
                            <div style="font-size: 0.8rem; color: var(--text-muted; text-transform: uppercase;">Fondato</div>
                            <div id="club-date" style="font-size: 1.2rem; font-weight: 700; color: var(--text-primary);">-</div>
                        </div>
                    </div>

                    <!-- ROSA SQUADRA -->
                    <div class="card mt-4 animate-slideUp stagger-3" style="background: transparent; border: none; padding: 0;">
                        <h4 class="mb-3" style="color: var(--text-primary);"><i class="fas fa-users text-gold"></i> Rosa Squadra</h4>
                        <div id="members-list" class="card" style="padding: 10px;"><p class="text-muted">Caricamento...</p></div>
                    </div>

                    <!-- ACTION BUTTONS -->
                    <div class="action-buttons-container mt-4 animate-slideUp stagger-4">
                        <button id="join-btn" class="btn btn-primary btn-large btn-block" style="display:none;">Unisciti</button>
                        <button id="leave-btn" class="btn btn-danger btn-large btn-block" style="display:none;">Abbandona Club</button>
                    </div>

                </div>

                <div id="error-state" class="empty-state" style="display: none;">
                    <div class="empty-state-icon"><i class="fas fa-exclamation-triangle" style="color: var(--accent-red);"></i></div>
                    <h3 class="empty-state-title">Errore</h3>
                    <p class="text-muted">Club non trovato.</p>
                    <a href="club.html" class="btn btn-secondary mt-2">Torna ai Club</a>
                </div>

            </div>
        </main>
    </div>

    <script>
        const BIN_ID_CLUBS = '6a2bea3dda38895dfeb4410a';
        const BIN_ID_USERS = '6a2ae33cda38895dfeaee508';
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        const urlParams = new URLSearchParams(window.location.search);
        const clubId = urlParams.get('id');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        let currentClub = null;
        let allData = null;
        let usersList = [];

        // UI SETUP
        document.getElementById('menu-btn').onclick = () => { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').classList.add('active'); };
        document.getElementById('close-btn').onclick = () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
        document.getElementById('overlay').onclick = () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.href = '../home-non-loggato.html'; };

        function getLogo(club) {
            if (!club) return null;
            const props = ['logo', 'immagine', 'image', 'logoUrl', 'foto', 'img', 'shield'];
            for (let p of props) { if (club[p] && typeof club[p] === 'string' && club[p].length > 5) return club[p]; }
            for (let key in club) {
                let val = club[key];
                if (typeof val === 'string' && val.length > 10) {
                    if (val.includes('http') || val.includes('data:image') || val.includes('.png')) return val;
                }
            }
            return null;
        }

        async function loadData() {
            if (!clubId) { showError(); return; }

            try {
                const [clubRes, userRes] = await Promise.all([
                    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, { headers: { 'X-Master-Key': API_KEY }, cache: 'no-store' }),
                    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_USERS}/latest`, { headers: { 'X-Master-Key': API_KEY }, cache: 'no-store' })
                ]);

                const clubData = await clubRes.json();
                const userData = await userRes.json();

                usersList = userData.record.users || [];
                allData = clubData.record;

                let clubs = [];
                if (Array.isArray(allData)) clubs = allData;
                else clubs = allData.clubs || allData.club || [];

                currentClub = clubs.find(c => c.id === clubId);

                if (!currentClub) { showError(); } 
                else { renderUI(); }

            } catch (e) { console.error(e); showError(); }
        }

        function showError() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
        }

        function renderUI() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // 1. Header Info
            document.getElementById('club-name').textContent = currentClub.name || currentClub.nome || 'Club';
            
            // Fix Icona Stadio
            const stadium = currentClub.stadium || currentClub.stadio;
            document.getElementById('club-stadium').innerHTML = stadium ? `<i class="fas fa-futbol"></i> <span>${stadium}</span>` : '<i class="fas fa-futbol"></i> <span>Stadio Non Definito</span>';

            // Logo
            const logoSrc = getLogo(currentClub);
            if (logoSrc) document.getElementById('club-logo').innerHTML = `<img src="${logoSrc}" alt="Logo">`;
            
            // Data
            if(currentClub.createdAt) document.getElementById('club-date').textContent = new Date(currentClub.createdAt).toLocaleDateString('it-IT');

            // Link Formazione (passa l'ID)
            document.getElementById('link-formazione').href = `formazione.html?id=${clubId}`;

            // 2. Membri
            const members = currentClub.members || [];
            document.getElementById('member-count').textContent = members.length;
            
            let membersHtml = '';
            members.forEach(m => {
                let mId = (typeof m === 'object' && m !== null && m.id) ? m.id : m;
                const u = usersList.find(u => String(u.id) === String(mId));
                const name = u ? u.nomeEA : `ID: ${mId}`;
                
                membersHtml += `<div class="member-item">
                    <div class="member-avatar"><i class="fas fa-user"></i></div>
                    <div class="member-name">${name}</div>
                </div>`;
            });
            document.getElementById('members-list').innerHTML = membersHtml || '<p class="text-muted" style="padding:10px;">Nessun membro.</p>';

            // 3. Logica Accesso (Capitano / Membro)
            let isCaptain = false;
            const capProps = ['captain', 'owner', 'createdBy', 'founder', 'presidente'];
            capProps.forEach(p => {
                if(currentClub[p] && String(currentClub[p]) === String(user.id)) isCaptain = true;
            });

            let isMember = false;
            if (members.length > 0) {
                members.forEach(m => {
                    let mId = (typeof m === 'object' && m !== null && m.id) ? m.id : m;
                    if (String(mId) === String(user.id)) isMember = true;
                });
            }

            if (isCaptain) {
                document.getElementById('captain-badge').style.display = 'inline-flex';
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('join-btn').style.display = 'none';
                document.getElementById('leave-btn').style.display = 'none';
                renderRequests();
            } else if (isMember) {
                document.getElementById('leave-btn').style.display = 'block';
                document.getElementById('join-btn').style.display = 'none';
            } else {
                document.getElementById('join-btn').style.display = 'block';
                document.getElementById('join-btn').onclick = () => requestJoin();
            }
        }

        function renderRequests() {
            const requests = currentClub.requests || [];
            const listEl = document.getElementById('requests-list');
            if (requests.length === 0) { listEl.innerHTML = '<p class="text-muted" style="margin:0;">Nessuna richiesta in sospeso.</p>'; return; }

            let html = '';
            requests.forEach(req => {
                let rId = (typeof req === 'object' && req !== null && req.id) ? req.id : req;
                const u = usersList.find(u => String(u.id) === String(rId));
                const name = u ? u.nomeEA : `ID: ${rId}`;

                html += `<div class="request-item">
                    <span>${name}</span>
                    <div>
                        <button class="btn btn-primary btn-xs" onclick="accept('${rId}')"><i class="fas fa-check"></i></button>
                        <button class="btn btn-danger btn-xs" onclick="reject('${rId}')" style="margin-left:5px;"><i class="fas fa-times"></i></button>
                    </div>
                </div>`;
            });
            listEl.innerHTML = html;
        }

        window.accept = async (userId) => {
            if(!confirm("Accettare questo membro?")) return;
            if(!currentClub.members) currentClub.members = [];
            currentClub.members.push(userId);
            currentClub.requests = currentClub.requests.filter(id => String(id) !== String(userId));
            await saveData();
            alert('Membro aggiunto!');
            location.reload();
        };

        window.reject = async (userId) => {
            if(!confirm("Rifiutare questa richiesta?")) return;
            currentClub.requests = currentClub.requests.filter(id => String(id) !== String(userId));
            await saveData();
            alert('Richiesta rifiutata.');
            location.reload();
        };

        async function requestJoin() {
            if(!user) return alert("Accedi per unirti.");
            if(!currentClub.requests) currentClub.requests = [];
            if(currentClub.requests.some(r => String(r) === String(user.id))) return alert("Richiesta già inviata.");
            currentClub.requests.push(user.id);
            await saveData();
            alert('Richiesta inviata!');
            location.reload();
        }

        async function saveData() {
            let payload;
            if (Array.isArray(allData)) {
                let idx = allData.findIndex(c => c.id === clubId);
                if(idx !== -1) allData[idx] = currentClub;
                payload = allData;
            } else {
                let key = allData.clubs ? 'clubs' : 'club';
                let list = allData[key];
                let idx = list.findIndex(c => c.id === clubId);
                if(idx !== -1) list[idx] = currentClub;
                payload = allData;
            }
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(payload)
            });
        }

        loadData();
    </script>
</body>
</html>
