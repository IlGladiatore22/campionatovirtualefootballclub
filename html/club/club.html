<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Club</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css?v=2">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        html, body { height: auto; min-height: 100vh; overflow-y: auto; }
        
        /* Stile Card Club */
        .club-card {
            position: relative;
            overflow: hidden;
        }
        .club-logo {
            width: 100%;
            height: 150px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .club-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Oppure cover se vuoi riempire tutto */
        }
        .club-logo i {
            font-size: 3rem;
            color: var(--accent-gold);
        }
        /* Badge colori applicati dinamicamente */
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- Header Standard -->
        <header class="header">
            <div class="header-left">
                <div class="logo-container">
                    <div class="logo">FC</div>
                    <span class="site-name">FC27</span>
                </div>
                <span class="user-greeting">Benvenuto, <span id="username-display">Utente</span></span>
            </div>
            <div class="header-right">
                <button class="header-btn" onclick="window.location.href='../notifiche.html'"><i class="fas fa-bell"></i></button>
                <button class="header-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="padding-top: 30px;">
                <div class="flex justify-between items-center mb-4">
                    <div><h1>Club</h1><p class="text-muted">Elenco dei Club FC27</p></div>
                    <!-- Pulsante crea visibile solo admin -->
                    <a href="../admin/crea-club.html" id="create-btn" class="btn btn-primary" style="display: none;"><i class="fas fa-plus"></i> Crea</a>
                </div>

                <div class="grid-3" id="clubs-grid">
                    <!-- Loading state -->
                    <div class="text-center" style="grid-column: 1/-1;">
                        <p><i class="fas fa-spinner fa-spin"></i> Caricamento club...</p>
                    </div>
                </div>
                
                <div id="empty-state" class="empty-state" style="display:none;">
                    <div class="empty-state-icon"><i class="fas fa-shield-alt"></i></div>
                    <h3 class="empty-state-title">Nessun Club trovato</h3>
                    <p class="empty-state-text">Non ci sono club registrati nel database.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Sidebar e Script Sessione (Semplificato) -->
    <script>
        // === CONFIGURAZIONE JSONBIN ===
        const BIN_ID_CLUBS = '6a2bea3dda38895dfeb4410a';
        // ATTENZIONE: In un sito pubblico usare una Access Key di sola lettura!
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S'; // Master Key

        // Controllo sessione base
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user || !localStorage.getItem('auth_token')) {
            // Se non loggato, potresti voler reindirizzare o mostrare contenuti limitati
            document.getElementById('username-display').textContent = 'Ospite';
        } else {
            document.getElementById('username-display').textContent = user.nomeEA;
            if (user.isAdmin) {
                document.getElementById('create-btn').style.display = 'inline-flex';
            }
        }

        // === CARICA CLUB DAL DATABASE ===
        async function loadClubs() {
            const grid = document.getElementById('clubs-grid');
            const emptyState = document.getElementById('empty-state');
            
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                
                if (!response.ok) throw new Error("Errore connessione DB");
                
                const data = await response.json();
                const clubs = data.record.clubs || [];

                grid.innerHTML = ''; // Pulisci loading

                if (clubs.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';

                clubs.forEach((club, index) => {
                    const card = document.createElement('div');
                    card.className = 'card club-card animate-slideUp';
                    card.style.animationDelay = (index * 0.1) + 's';
                    
                    // Se non ha logo, metti l'icona
                    const logoContent = club.logo 
                        ? `<img src="${club.logo}" alt="${club.name}">`
                        : `<i class="fas fa-shield-alt"></i>`;

                    card.innerHTML = `
                        <div class="club-logo">${logoContent}</div>
                        <span class="card-badge" style="background: ${club.colors?.primary || '#333'}; color: ${club.colors?.secondary || '#fff'};">${club.tag || 'CLUB'}</span>
                        <h4 class="card-title">${club.name}</h4>
                        <p class="card-description">${club.stadium || 'Stadio non definito'}</p>
                        <div class="flex justify-between mt-2">
                            <span class="text-muted"><i class="fas fa-users"></i> ${club.members ? club.members.length : 0} Membri</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = `<div class="text-center" style="grid-column: 1/-1;"><p style="color:red;">Errore caricamento club dal database.</p></div>`;
            }
        }

        loadClubs();

        // Logica menu mobile (semplificato)
        document.getElementById('menu-btn').addEventListener('click', () => {
            // Qui andrebbe la logica sidebar se serve
            alert('Menu laterale non implementato in questo file');
        });
    </script>
</body>
</html>
