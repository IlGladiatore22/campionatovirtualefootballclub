<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Registrazione</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../estetica/style.css?v=2">
    <link rel="stylesheet" href="../estetica/components.css?v=2">
    <style>
        html, body { height: auto; min-height: 100vh; overflow-y: auto; }
        
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .success-content {
            text-align: center;
            animation: scaleIn 0.4s ease;
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
            max-width: 400px;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="home-non-loggato.html" class="logo-container" style="text-decoration: none;">
                    <div class="logo">FC</div>
                    <span class="site-name">FC27</span>
                </a>
            </div>
            <div class="header-right">
                <a href="accesso.html" class="btn btn-small btn-secondary">
                    <i class="fas fa-sign-in-alt"></i> Accedi
                </a>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="max-width: 500px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <div class="text-center mb-3">
                        <div class="logo" style="width: 60px; height: 60px; font-size: 1.3rem; margin: 0 auto 16px;">FC</div>
                        <h2>Registrati</h2>
                        <p class="text-muted mt-1">Crea il tuo account FC27</p>
                    </div>

                    <div id="error-message" class="mb-2" style="display: none; padding: 12px 16px; background: rgba(230, 57, 70, 0.15); border: 1px solid var(--accent-red); border-radius: var(--border-radius); color: var(--accent-red);">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="error-text"></span>
                    </div>

                    <form id="register-form">
                        <!-- I campi del form sono invariati, li riporto brevemente per completezza -->
                        <div class="input-group">
                            <label class="input-label" for="nomeEA"><i class="fas fa-user"></i> Nome EA *</label>
                            <input type="text" id="nomeEA" class="input-field" placeholder="Il tuo nome EA" autocomplete="off" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="gamertag"><i class="fas fa-gamepad"></i> Gamertag *</label>
                            <input type="text" id="gamertag" class="input-field" placeholder="Il tuo gamertag unico" autocomplete="off" required>
                            <small class="text-muted">Usalo per accedere</small>
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="discordId"><i class="fab fa-discord"></i> Discord ID</label>
                            <input type="text" id="discordId" class="input-field" placeholder="Es. 123456789012345678">
                        </div>

                        <div class="input-group">
                            <label class="input-label"><i class="fas fa-desktop"></i> Piattaforma *</label>
                            <div class="platform-selector">
                                <button type="button" class="platform-btn" data-platform="PC"><i class="fas fa-desktop"></i> PC</button>
                                <button type="button" class="platform-btn" data-platform="XBOX"><i class="fab fa-xbox"></i> XBOX</button>
                                <button type="button" class="platform-btn" data-platform="PS"><i class="fab fa-playstation"></i> PS</button>
                            </div>
                            <input type="hidden" id="piattaforma" value="">
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="password"><i class="fas fa-lock"></i> Password *</label>
                            <div style="position: relative;">
                                <input type="password" id="password" class="input-field" placeholder="Minimo 6 caratteri" required>
                                <button type="button" id="toggle-btn" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;">
                                    <i class="fas fa-eye" id="pass-icon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="confirmPassword"><i class="fas fa-lock"></i> Conferma Password *</label>
                            <input type="password" id="confirmPassword" class="input-field" placeholder="Ripeti la password" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3">
                            <i class="fas fa-user-plus"></i> Registrati
                        </button>
                    </form>

                    <p class="text-center text-muted mt-3">
                        Hai gia un account? <a href="accesso.html">Accedi</a>
                    </p>
                </div>
            </div>
        </main>
    </div>

    <!-- Success Overlay MODIFICATO -->
    <div id="success-overlay" class="success-overlay">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h2 style="margin-bottom: 10px;">Registrazione completata!</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">
                L'utente è stato salvato nel browser.<br>
                Clicca il pulsante sotto per scaricare il file per GitHub.
            </p>
            
            <!-- PULSANTE DOWNLOAD AGGIUNTO -->
            <button id="download-btn" class="btn btn-primary btn-large" style="width: 100%; margin-bottom: 15px;">
                <i class="fas fa-download"></i> Scarica Database (JSON)
            </button>

            <a href="accesso.html" class="btn btn-secondary" style="width: 100%;">
                Vai al Login
            </a>
        </div>
    </div>

    <script>
        let selectedPlatform = null;

        // Platform selection
        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedPlatform = this.dataset.platform;
                document.getElementById('piattaforma').value = selectedPlatform;
                document.getElementById('error-message').style.display = 'none';
            });
        });

        // Toggle password
        document.getElementById('toggle-btn').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = document.getElementById('pass-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Form submit
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const nomeEA = document.getElementById('nomeEA').value.trim();
            const gamertag = document.getElementById('gamertag').value.trim();
            const discordId = document.getElementById('discordId').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            errorMsg.style.display = 'none';

            if (!nomeEA || !gamertag || !password) {
                errorText.textContent = 'Compila tutti i campi obbligatori';
                errorMsg.style.display = 'block';
                return;
            }
            if (gamertag.length < 3) { errorText.textContent = 'Il gamertag deve avere almeno 3 caratteri'; errorMsg.style.display = 'block'; return; }
            if (!selectedPlatform) { errorText.textContent = 'Seleziona una piattaforma'; errorMsg.style.display = 'block'; return; }
            if (password.length < 6) { errorText.textContent = 'La password deve avere almeno 6 caratteri'; errorMsg.style.display = 'block'; return; }
            if (password !== confirmPassword) { errorText.textContent = 'Le password non coincidono'; errorMsg.style.display = 'block'; return; }

            let users = [];
            try {
                const stored = localStorage.getItem('fc27_users');
                users = stored ? JSON.parse(stored) : [];
            } catch (e) {
                users = [];
            }

            const exists = users.find(u => u.gamertag && u.gamertag.toLowerCase() === gamertag.toLowerCase());
            if (exists) {
                errorText.textContent = 'Questo gamertag è già registrato';
                errorMsg.style.display = 'block';
                return;
            }

            const newUser = {
                id: 'user_' + Date.now(),
                nomeEA: nomeEA,
                gamertag: gamertag,
                discordId: discordId || '',
                piattaforma: selectedPlatform,
                password: password,
                isAdmin: false,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('fc27_users', JSON.stringify(users));

            // Notifica benvenuto
            const notifications = JSON.parse(localStorage.getItem('fc27_notifications') || '[]');
            notifications.push({
                id: 'notif_' + Date.now(),
                userId: newUser.id,
                title: 'Benvenuto in FC27!',
                message: 'Ciao ' + nomeEA + '! Grazie per esserti registrato.',
                read: false,
                createdAt: new Date().toISOString()
            });
            localStorage.setItem('fc27_notifications', JSON.stringify(notifications));

            // MOSTRA OVERLAY SENZA REINDIRIZZAMENTO AUTOMATICO
            document.getElementById('success-overlay').style.display = 'flex';
            
            // Prepara il tasto download
            document.getElementById('download-btn').onclick = function() {
                downloadJSONFile(users);
                // Dopo il download, cambio il testo del bottone per conferma
                this.innerHTML = '<i class="fas fa-check"></i> Scaricato!';
                this.style.background = 'var(--accent-green)';
            };
        });

        // Funzione per scaricare il file
        function downloadJSONFile(data) {
            const jsonString = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "registrazioni.json";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
