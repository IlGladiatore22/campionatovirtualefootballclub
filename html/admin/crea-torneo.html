<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVFC ADMIN - Crea Torneo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        body { background: var(--bg-primary); }
        .form-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .form-section h3 { margin-bottom: 15px; color: var(--accent-blue); font-size: 1.1rem; }
        .format-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .format-option { flex: 1; padding: 15px; background: var(--bg-tertiary); border: 2px solid var(--border-color); border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.2s; }
        .format-option:hover { border-color: var(--accent-blue); }
        .format-option.active { border-color: var(--accent-blue); background: rgba(52, 152, 219, 0.1); }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="dashboard.html" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></a>
                <span class="site-name" style="color: var(--accent-orange);">Crea Torneo</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="max-width: 600px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <h2 class="mb-3 text-center"><i class="fas fa-medal" style="color: #9b59b6;"></i> Nuovo Torneo</h2>
                    
                    <form id="form">
                        <div class="form-section">
                            <h3><i class="fas fa-info-circle"></i> Informazioni</h3>
                            <div class="input-group">
                                <label class="input-label">Nome Torneo *</label>
                                <input type="text" id="nome" class="input-field" placeholder="Es. Torneo del Venerdì" required>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Descrizione</label>
                                <textarea id="descrizione" class="input-field" rows="2"></textarea>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3><i class="fas fa-sitemap"></i> Formato Torneo</h3>
                            
                            <label class="input-label">Struttura</label>
                            <div class="format-selector">
                                <div class="format-option active" data-format="groups_knockout" onclick="selectFormat(this)">
                                    <i class="fas fa-table"></i>
                                    <div style="font-size: 0.8rem; margin-top: 5px;">Gironi + Eliminazione</div>
                                </div>
                                <div class="format-option" data-format="groups_only" onclick="selectFormat(this)">
                                    <i class="fas fa-th-large"></i>
                                    <div style="font-size: 0.8rem; margin-top: 5px;">Solo Gironi</div>
                                </div>
                                <div class="format-option" data-format="knockout_only" onclick="selectFormat(this)">
                                    <i class="fas fa-project-diagram"></i>
                                    <div style="font-size: 0.8rem; margin-top: 5px;">Solo Eliminazione</div>
                                </div>
                            </div>
                            <input type="hidden" id="formato" value="groups_knockout">

                            <div class="grid-2 mt-3">
                                <div class="input-group">
                                    <label class="input-label">Numero Gironi</label>
                                    <input type="number" id="num_gironi" class="input-field" value="4" min="1" max="16">
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Qualificati per Girone</label>
                                    <input type="number" id="qualificati_per_girone" class="input-field" value="2" min="1" max="4">
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3><i class="fas fa-cogs"></i> Impostazioni</h3>
                            <div class="grid-2">
                                <div class="input-group">
                                    <label class="input-label">Max Partecipanti</label>
                                    <input type="number" id="max_squadre" class="input-field" placeholder="Es. 16">
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Costo (Crediti)</label>
                                    <input type="number" id="costo" class="input-field" value="0" min="0">
                                </div>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Data Inizio</label>
                                <input type="text" id="data_inizio" class="input-field" placeholder="Es. 25 Dicembre">
                            </div>
                            <div class="input-group">
                                <label class="input-label">Premi (uno per riga)</label>
                                <textarea id="premi" class="input-field" rows="2"></textarea>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3" style="background: var(--accent-orange);">Crea Torneo</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // === CONFIGURAZIONE ===
        const BIN_ID_TORNEI = '6a2da647da38895dfebb4797';
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        const admin = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!admin || !admin.isAdmin) window.location.href = 'accesso-admin.html';

        window.selectFormat = function(el) {
            document.querySelectorAll('.format-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('formato').value = el.dataset.format;
        }

        document.getElementById('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creazione...';

            try {
                // 1. Leggi tornei esistenti
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_TORNEI}/latest`, {
                    headers: { 'X-Master-Key': API_KEY },
                    cache: 'no-store'
                });

                if (res.status === 404) throw new Error("Bin Tornei non trovato. Inizializzalo su JSONBin.");
                if (!res.ok) throw new Error("Errore connessione database.");

                const data = await res.json();
                let listaTornei = data.record.tornei || [];

                // 2. Crea oggetto in italiano
                const nuovoTorneo = {
                    id: 'tourn_' + Date.now(),
                    nome: document.getElementById('nome').value,
                    descrizione: document.getElementById('descrizione').value,
                    stato: 'aperta',
                    formato: document.getElementById('formato').value,
                    num_gironi: parseInt(document.getElementById('num_gironi').value) || 4,
                    qualificati_per_girone: parseInt(document.getElementById('qualificati_per_girone').value) || 2,
                    max_squadre: parseInt(document.getElementById('max_squadre').value) || 16,
                    costo: parseInt(document.getElementById('costo').value) || 0,
                    data_inizio: document.getElementById('data_inizio').value,
                    premi: document.getElementById('premi').value,
                    club_registrati: [],
                    // Dati Gironi
                    gironi: [], 
                    // Dati Eliminazione
                    turni_eliminatoria: [],
                    creato_il: new Date().toISOString()
                };

                // 3. Pusha e salva
                listaTornei.push(nuovoTorneo);

                const saveRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_TORNEI}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ "tornei": listaTornei })
                });

                if (saveRes.status === 403) throw new Error("Errore 403: Permesso negato.");
                if (!saveRes.ok) throw new Error("Errore salvataggio.");

                alert('Torneo creato con successo!');
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error(err);
                alert("Errore: " + err.message);
                btn.disabled = false;
                btn.innerHTML = 'Crea Torneo';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('admin');
            window.location.href = 'accesso-admin.html';
        });
    </script>
</body>
</html>
