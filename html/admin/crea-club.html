<script>
    // === CONFIGURAZIONE JSONBIN ===
    // RICORDA: Genera una nuova API Key su jsonbin.io perché questa è pubblica ora!
    const BIN_ID_USERS = '6a2ae33cda38895dfeaee508'; 
    const BIN_ID_CLUBS = '6a2bea3dda38895dfeb4410a'; 
    const API_KEY = 'INSERISCI_LA_TUA_NUOVA_CHIAVE_SICURA'; 

    // === CONTROLLO SESSIONE ADMIN ===
    const admin = JSON.parse(localStorage.getItem('admin') || 'null');
    if (!admin || !admin.isAdmin) {
        window.location.href = 'accesso-admin.html';
    }

    // === CARICA UTENTI (FIX: Aggiunto cache: 'no-store') ===
    async function loadUsersForSelect() {
        const select = document.getElementById('captain');
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_USERS}/latest`, {
                headers: { 'X-Master-Key': API_KEY },
                cache: 'no-store' // FIX: Forza il download dei dati freschi
            });
            const data = await res.json();
            const users = data.record.users || [];
            
            select.innerHTML = '<option value="">-- Seleziona Utente --</option>';
            
            users.forEach(u => {
                select.innerHTML += `<option value="${u.id}">${u.nomeEA} (${u.gamertag})</option>`;
            });
        } catch (e) {
            console.error("Errore caricamento utenti:", e);
            select.innerHTML = '<option value="">Errore connessione DB</option>';
        }
    }
    loadUsersForSelect();

    // Preview Logo
    let logoBase64 = '';
    document.getElementById('logo-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            // FIX OPZIONALE: Controllare la dimensione del file per non rompere il DB
            if (file.size > 200000) { // 200KB limite
                alert("L'immagine è troppo pesante! Carica un'immagine più leggera.");
                return;
            }

            const reader = new FileReader();
            reader.onload = (ev) => {
                logoBase64 = ev.target.result;
                document.getElementById('preview-img').src = logoBase64;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('placeholder-icon').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });

    // Sync Color Inputs
    ['color1', 'color2'].forEach(id => {
        const color = document.getElementById(id);
        const text = document.getElementById(id + '-text');
        color.oninput = () => text.value = color.value;
        text.oninput = () => { if(/^#[0-9A-Fa-f]{6}$/.test(text.value)) color.value = text.value; };
    });

    // Submit
    document.getElementById('form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio...';

        try {
            // 1. Prendi lista club attuali (FIX: Aggiunto cache: 'no-store')
            const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, {
                headers: { 'X-Master-Key': API_KEY },
                cache: 'no-store' // FIX: Leggiamo sempre l'ultima versione reale
            });
            
            if (!getRes.ok) throw new Error("Impossibile leggere il database.");
            
            const getData = await getRes.json();
            let clubs = getData.record.clubs || [];

            const captainId = document.getElementById('captain').value;
            
            // 2. Crea oggetto Club
            const newClub = {
                id: 'club_' + Date.now(),
                name: document.getElementById('name').value,
                tag: document.getElementById('tag').value.toUpperCase(),
                logo: logoBase64, 
                captain: captainId || null,
                members: captainId ? [captainId] : [],
                colors: { primary: document.getElementById('color1').value, secondary: document.getElementById('color2').value },
                stadium: document.getElementById('stadium').value,
                formation: '4-3-3',
                tactics: {},
                lineup: {}, 
                requests: [],
                createdAt: new Date().toISOString()
            };

            // 3. Salva nel Bin Club
            clubs.push(newClub);
            
            const saveRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify({ "clubs": clubs })
            });

            // FIX: Controlliamo se il salvataggio è riuscito davvero
            if (!saveRes.ok) {
                throw new Error("Il database ha rifiutato il salvataggio (controlla dimensione dati).");
            }

            alert('Club creato con successo!');
            window.location.href = 'dashboard.html';

        } catch (err) {
            console.error(err);
            alert("Errore durante il salvataggio: " + err.message);
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Crea Club';
        }
    });

    // Logout Admin
    document.getElementById('logout-btn').addEventListener('click', function() {
        localStorage.removeItem('admin');
        window.location.href = 'accesso-admin.html';
    });
</script>
