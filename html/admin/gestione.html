<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVFC ADMIN - Gestione Dati</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css?v=2">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        .tabs-container { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; overflow-x: auto; }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 10px 20px; cursor: pointer; font-weight: 600; border-bottom: 3px solid transparent; transition: all 0.3s; white-space: nowrap; }
        .tab-btn.active { color: var(--accent-orange); border-bottom-color: var(--accent-orange); }
        .tab-btn:hover { color: var(--text-primary); }
        
        .content-section { display: none; }
        .content-section.active { display: block; }

        .item-row {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Stile Logo/Icona */
        .item-logo {
            width: 45px; height: 45px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .item-logo img { width: 100%; height: 100%; object-fit: cover; }
        .item-logo i { color: var(--text-muted); font-size: 1.2rem; }

        .item-info { flex: 1; }
        .item-info h4 { margin: 0; color: var(--text-primary); font-size: 1rem; }
        .item-info p { margin: 0; color: var(--text-muted); font-size: 0.8rem; }
        
        .item-actions { display: flex; gap: 10px; flex-shrink: 0; }
        .btn-sm { padding: 8px 12px; font-size: 0.8rem; border-radius: 6px; cursor: pointer; border: none; color: white; display: flex; align-items: center; justify-content: center; width: 35px; height: 35px;}
        .btn-edit { background: var(--accent-blue); }
        .btn-delete { background: var(--accent-red); }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="dashboard.html" class="header-btn" style="background: transparent; border: none;"><i class="fas fa-arrow-left"></i></a>
                <span class="site-name" style="color: var(--accent-orange);">Gestione Dati</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="padding: 30px 20px;">
                
                <!-- Tab Navigation -->
                <div class="tabs-container">
                    <button class="tab-btn active" onclick="openTab('club')"><i class="fas fa-shield-alt"></i> Club</button>
                    <button class="tab-btn" onclick="openTab('competizioni')"><i class="fas fa-trophy"></i> Competizioni</button>
                    <button class="tab-btn" onclick="openTab('tornei')"><i class="fas fa-medal"></i> Tornei</button>
                </div>

                <!-- SEZIONE CLUB -->
                <div id="club" class="content-section active">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3>Club Registrati</h3>
                        <button class="btn btn-small btn-secondary" onclick="loadClubData()"><i class="fas fa-sync-alt"></i></button>
                    </div>
                    <div id="club-list">
                        <p style="text-align:center; color:var(--text-muted);">Caricamento...</p>
                    </div>
                </div>

                <!-- SEZIONE COMPETIZIONI -->
                <div id="competizioni" class="content-section">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3>Competizioni Attive</h3>
                        <button class="btn btn-small btn-secondary" onclick="loadCompetizioniData()"><i class="fas fa-sync-alt"></i></button>
                    </div>
                    <div id="competizioni-list">
                        <p style="text-align:center; color:var(--text-muted);">Caricamento...</p>
                    </div>
                </div>

                <!-- SEZIONE TORNEI -->
                <div id="tornei" class="content-section">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3>Tornei</h3> <!-- Rimosso "(Locale)" -->
                        <button class="btn btn-small btn-secondary" onclick="loadTorneiData()"><i class="fas fa-sync-alt"></i></button>
                    </div>
                    <div id="tornei-list">
                        <p style="text-align:center; color:var(--text-muted);">Caricamento...</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // === CONFIGURAZIONE ===
        const BIN_ID_CLUBS = '6a2bea3dda38895dfeb4410a';
        const BIN_ID_COMPETIZIONI = '6a2d7dcbf5f4af5e29ec21b0';
        const BIN_ID_TORNEI = '6a2da647da38895dfebb4797'; // NUOVO BIN TORNEI
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        const admin = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!admin || !admin.isAdmin) window.location.href = 'accesso-admin.html';

        // === FUNZIONI TAB ===
        function openTab(tabName) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');

            if(tabName === 'club') loadClubData();
            if(tabName === 'competizioni') loadCompetizioniData();
            if(tabName === 'tornei') loadTorneiData();
        }

        // === GESTIONE CLUB ===
        async function loadClubData() {
            const container = document.getElementById('club-list');
            container.innerHTML = '<p style="text-align:center;">Caricamento...</p>';
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, { headers: { 'X-Master-Key': API_KEY }, cache: 'no-store' });
                const data = await res.json();
                const clubs = data.record.club || [];
                
                container.innerHTML = '';
                if(clubs.length === 0) { container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Nessun club.</p>'; return; }

                clubs.forEach(c => {
                    const logoHtml = c.logo 
                        ? `<img src="${c.logo}" alt="${c.nome || c.name}">` 
                        : `<i class="fas fa-shield-alt"></i>`;

                    container.innerHTML += `
                        <div class="item-row">
                            <div class="item-logo">${logoHtml}</div>
                            <div class="item-info">
                                <h4>${c.nome || c.name}</h4>
                                <p>Tag: ${c.tag || '-'}</p>
                            </div>
                            <div class="item-actions">
                                <button class="btn-sm btn-edit" onclick="modificaClub('${c.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-sm btn-delete" onclick="eliminaClub('${c.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            } catch(e) { container.innerHTML = '<p style="color:red; text-align:center;">Errore caricamento.</p>'; }
        }

        async function eliminaClub(id) {
            if(!confirm("Eliminare questo club?")) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}/latest`, { headers: { 'X-Master-Key': API_KEY } });
                const data = await res.json();
                let lista = data.record.club || [];
                lista = lista.filter(c => c.id !== id);
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_CLUBS}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify({ "club": lista })
                });
                loadClubData();
            } catch(e) { alert("Errore eliminazione."); }
        }
        
        function modificaClub(id) { window.location.href = `modifica-club.html?id=${id}`; }

        // === GESTIONE COMPETIZIONI ===
        async function loadCompetizioniData() {
            const container = document.getElementById('competizioni-list');
            container.innerHTML = '<p style="text-align:center;">Caricamento...</p>';
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_COMPETIZIONI}/latest`, { headers: { 'X-Master-Key': API_KEY }, cache: 'no-store' });
                const data = await res.json();
                const comps = data.record.competizioni || [];
                
                container.innerHTML = '';
                if(comps.length === 0) { container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Nessuna competizione.</p>'; return; }

                comps.forEach(c => {
                    const imgHtml = c.immagine 
                        ? `<img src="${c.immagine}" alt="${c.nome || c.name}">` 
                        : `<i class="fas fa-trophy"></i>`;

                    container.innerHTML += `
                        <div class="item-row">
                            <div class="item-logo">${imgHtml}</div>
                            <div class="item-info">
                                <h4>${c.nome || c.name}</h4>
                                <p>Stato: ${c.stato || c.status}</p>
                            </div>
                            <div class="item-actions">
                                <button class="btn-sm btn-edit" onclick="modificaCompetizione('${c.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-sm btn-delete" onclick="eliminaCompetizione('${c.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            } catch(e) { container.innerHTML = '<p style="color:red; text-align:center;">Errore caricamento.</p>'; }
        }

        async function eliminaCompetizione(id) {
            if(!confirm("Eliminare questa competizione?")) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_COMPETIZIONI}/latest`, { headers: { 'X-Master-Key': API_KEY } });
                const data = await res.json();
                let lista = data.record.competizioni || [];
                lista = lista.filter(c => c.id !== id);
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_COMPETIZIONI}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify({ "competizioni": lista })
                });
                loadCompetizioniData();
            } catch(e) { alert("Errore eliminazione."); }
        }

        function modificaCompetizione(id) { window.location.href = `modifica-competizione.html?id=${id}`; }

        // === GESTIONE TORNEI (DATABASE) ===
        async function loadTorneiData() {
            const container = document.getElementById('tornei-list');
            container.innerHTML = '<p style="text-align:center;">Caricamento...</p>';
            
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_TORNEI}/latest`, { 
                    headers: { 'X-Master-Key': API_KEY }, 
                    cache: 'no-store' 
                });
                
                if (res.status === 404) throw new Error("Bin Tornei non trovato.");
                if (!res.ok) throw new Error("Errore connessione.");

                const data = await res.json();
                // Leggiamo l'array "tornei" (in italiano)
                const tornei = data.record.tornei || [];
                
                container.innerHTML = '';
                if(tornei.length === 0) { 
                    container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Nessun torneo.</p>'; 
                    return; 
                }

                tornei.forEach(t => {
                    // Usiamo i campi in italiano
                    const nomeTorneo = t.nome || t.name || 'Senza Nome';
                    const statoTorneo = t.stato || t.status || 'N/D';

                    container.innerHTML += `
                        <div class="item-row">
                            <div class="item-logo"><i class="fas fa-medal"></i></div>
                            <div class="item-info">
                                <h4>${nomeTorneo}</h4>
                                <p>Stato: ${statoTorneo}</p>
                            </div>
                            <div class="item-actions">
                                <button class="btn-sm btn-edit" onclick="alert('Modifica tornei in arrivo')"><i class="fas fa-edit"></i></button>
                                <button class="btn-sm btn-delete" onclick="eliminaTorneo('${t.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            } catch(e) {
                console.error(e);
                container.innerHTML = '<p style="color:red; text-align:center;">Errore caricamento tornei.</p>';
            }
        }

        async function eliminaTorneo(id) {
            if(!confirm("Eliminare questo torneo?")) return;
            try {
                // 1. Leggi lista attuale
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_TORNEI}/latest`, { 
                    headers: { 'X-Master-Key': API_KEY } 
                });
                const data = await res.json();
                let lista = data.record.tornei || [];
                
                // 2. Filtra
                lista = lista.filter(t => t.id !== id);
                
                // 3. Salva
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_TORNEI}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify({ "tornei": lista })
                });
                
                loadTorneiData();
            } catch(e) {
                console.error(e);
                alert("Errore eliminazione torneo.");
            }
        }

        // Init
        loadClubData();

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('admin');
            window.location.href = 'accesso-admin.html';
        });
    </script>
</body>
</html>
