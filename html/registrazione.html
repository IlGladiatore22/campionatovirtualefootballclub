<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC27 - Registrazione</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../estetica/style.css?v=2">
    <link rel="stylesheet" href="../estetica/components.css?v=2">
    <style> html, body { height: auto; min-height: 100vh; overflow-y: auto; } </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="home-non-loggato.html" class="logo-container" style="text-decoration: none;">
                    <div class="logo">FC</div>
                    <span class="site-name">FC27</span>
                </a>
            </div>
            <div class="header-right">
                <a href="accesso.html" class="btn btn-small btn-secondary"><i class="fas fa-sign-in-alt"></i> Accedi</a>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="max-width: 500px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <div class="text-center mb-3">
                        <div class="logo" style="width: 60px; height: 60px; font-size: 1.3rem; margin: 0 auto 16px;">FC</div>
                        <h2>Registrati</h2>
                        <p class="text-muted mt-1">Crea il tuo account FC27</p>
                    </div>

                    <div id="error-message" class="mb-2" style="display: none; padding: 12px 16px; background: rgba(230, 57, 70, 0.15); border: 1px solid var(--accent-red); border-radius: var(--border-radius); color: var(--accent-red);">
                        <i class="fas fa-exclamation-circle"></i> <span id="error-text"></span>
                    </div>

                    <form id="register-form">
                        <div class="input-group"><label class="input-label" for="nomeEA"><i class="fas fa-user"></i> Nome EA *</label><input type="text" id="nomeEA" class="input-field" placeholder="Il tuo nome EA" required></div>
                        <div class="input-group"><label class="input-label" for="gamertag"><i class="fas fa-gamepad"></i> Gamertag *</label><input type="text" id="gamertag" class="input-field" placeholder="Il tuo gamertag unico" required></div>
                        <div class="input-group"><label class="input-label" for="discordId"><i class="fab fa-discord"></i> Discord ID</label><input type="text" id="discordId" class="input-field" placeholder="Opzionale"></div>
                        
                        <div class="input-group">
                            <label class="input-label"><i class="fas fa-desktop"></i> Piattaforma *</label>
                            <div class="platform-selector">
                                <button type="button" class="platform-btn" data-platform="PC"><i class="fas fa-desktop"></i> PC</button>
                                <button type="button" class="platform-btn" data-platform="XBOX"><i class="fab fa-xbox"></i> XBOX</button>
                                <button type="button" class="platform-btn" data-platform="PS"><i class="fab fa-playstation"></i> PS</button>
                            </div>
                            <input type="hidden" id="piattaforma" value="">
                        </div>

                        <div class="input-group"><label class="input-label" for="password"><i class="fas fa-lock"></i> Password *</label><div style="position: relative;"><input type="password" id="password" class="input-field" placeholder="Minimo 6 caratteri" required><button type="button" id="toggle-btn" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;"><i class="fas fa-eye" id="pass-icon"></i></button></div></div>
                        <div class="input-group"><label class="input-label" for="confirmPassword"><i class="fas fa-lock"></i> Conferma Password *</label><input type="password" id="confirmPassword" class="input-field" placeholder="Ripeti la password" required></div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3"><i class="fas fa-user-plus"></i> Registrati</button>
                    </form>
                    <p class="text-center text-muted mt-3">Hai gia un account? <a href="accesso.html">Accedi</a></p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- CONFIGURAZIONE AGGIORNATA ---
        const BIN_ID = '6a2ae33cda38895dfeaee508';
        
        // CHIAVE CORRETTA COPIATA DALLA TUA IMMAGINE (X-ACCESS-KEY)
        const API_KEY = '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S';

        let selectedPlatform = null;

        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedPlatform = this.dataset.platform;
                document.getElementById('piattaforma').value = selectedPlatform;
            });
        });

        document.getElementById('toggle-btn').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = document.getElementById('pass-icon');
            if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); } 
            else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
        });

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nomeEA = document.getElementById('nomeEA').value.trim();
            const gamertag = document.getElementById('gamertag').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorMsg.style.display = 'none';

            if(!nomeEA || !gamertag || !password){ errorText.textContent='Compila tutto'; errorMsg.style.display='block'; return; }
            if(gamertag.length < 3){ errorText.textContent='Gamertag corto'; errorMsg.style.display='block'; return; }
            if(!selectedPlatform){ errorText.textContent='Scegli piattaforma'; errorMsg.style.display='block'; return; }
            if(password !== confirmPassword){ errorText.textContent='Password diverse'; errorMsg.style.display='block'; return; }

            try {
                // 1. LEGGI
                const getResp = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Access-Key': API_KEY }
                });

                if(getResp.status === 401) throw new Error("Chiave API errata.");
                if(!getResp.ok) throw new Error("Errore connessione.");

                const data = await getResp.json();
                let users = data.record.users || [];

                // 2. DUPLICATI
                if(users.find(u => u.gamertag.toLowerCase() === gamertag.toLowerCase())){
                    errorText.textContent = 'Gamertag già usato';
                    errorMsg.style.display = 'block';
                    return;
                }

                // 3. CREA UTENTE
                users.push({
                    id: 'user_' + Date.now(),
                    nomeEA, gamertag, discordId: document.getElementById('discordId').value.trim(),
                    piattaforma: selectedPlatform,
                    password, isAdmin: false,
                    createdAt: new Date().toISOString()
                });

                // 4. SCRIVI
                const putResp = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Access-Key': API_KEY
                    },
                    body: JSON.stringify({ "users": users })
                });

                if(putResp.status === 401) throw new Error("Chiave API non ha permessi scrittura.");
                if(!putResp.ok) throw new Error("Errore salvataggio.");

                alert('Registrazione OK!');
                window.location.href = 'accesso.html';

            } catch(err) {
                console.error(err);
                errorText.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
