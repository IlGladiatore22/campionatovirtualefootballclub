<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TITOLO - Caricamento</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        <link rel="stylesheet" href="estetica/style.css">
        <link rel="stylesheet" href="estetica/animations.css">
    </head>
    <body>
        
        <div id="loading-screen" class="loading-screen">
            <!-- MODIFICA: Inserita l'immagine logosito.png con stile rotondo -->
            <div class="loading-logo animate-pulse">
                <img src="estetica/logosito.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
            </div>
            
            <h1 class="loading-title">TITOLO</h1>

            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <p class="loading-status" id="loading-status">Inizializzazione...</p>
        </div>

        <script src="script/main.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                const loadingScreen = document.getElementById('loading-screen');
                const progressFill = document.getElementById('progress-fill');
                const loadingStatus = document.getElementById('loading-status');

                const steps = [
                    { progress: 20, status: 'Inizializzazione...' },
                    { progress: 40, status: 'Caricamento risorse...' },
                    { progress: 60, status: 'Connessione al server...' },
                    { progress: 80, status: 'Preparazione interfaccia...' },
                    { progress: 100, status: 'Caricamento completato!' },
                ];

                for (const step of steps) {
                    await new Promise(resolve => setTimeout(resolve, 600));
                    progressFill.style.width = step.progress + '%';
                    loadingStatus.textContent = step.status;
                }

                await new Promise(resolve => setTimeout(resolve, 500));

                loadingScreen.style.transition = 'opacity 0.5s ease';
                loadingScreen.style.opacity = '0';
                
                setTimeout(() => {

                    const tutorialCompleted = localStorage.getItem('tutorial_completed');

                    if (tutorialCompleted) {
                        window.location.href = 'html/home-non-loggato.html';
                    } else {
                        window.location.href = 'html/tutorial.html';
                    }
                }, 500);
            });
        </script>
    </body>
</html>
