<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVFC - Accesso Admin</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../estetica/style.css">
    <link rel="stylesheet" href="../../estetica/components.css">
    <style>
        html, body { height: auto; min-height: 100vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-left">
                <a href="../home-non-loggato.html" class="logo-container" style="text-decoration: none;">
                    <div class="logo">FC</div>
                    <span class="site-name">FC27</span>
                </a>
            </div>
            <div class="header-right">
                <a href="../accesso.html" class="btn btn-small btn-secondary">
                    <i class="fas fa-user"></i> Accesso Utente
                </a>
            </div>
        </header>

        <main class="main-content">
            <div class="container" style="max-width: 450px; padding: 60px 20px;">
                <div class="card animate-slideUp">
                    <div class="text-center mb-3">
                        <div class="logo" style="width: 60px; height: 60px; font-size: 1.3rem; margin: 0 auto 16px; background: linear-gradient(135deg, var(--accent-orange), #ff6b35);">
                            <i class="fas fa-shield-alt" style="font-size: 1.2rem;"></i>
                        </div>
                        <h2>Accesso Admin</h2>
                        <p class="text-muted mt-1">Pannello amministratori FC27</p>
                    </div>

                    <div id="error-message" class="mb-2" style="display: none; padding: 12px 16px; background: rgba(230, 57, 70, 0.15); border: 1px solid var(--accent-red); border-radius: var(--border-radius); color: var(--accent-red);">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="error-text"></span>
                    </div>

                    <form id="admin-form">
                        <div class="input-group">
                            <label class="input-label" for="username"><i class="fas fa-user-shield"></i> Username Admin</label>
                            <input type="text" id="username" class="input-field" placeholder="Username amministratore" autocomplete="off" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="password"><i class="fas fa-key"></i> Password Admin</label>
                            <input type="password" id="password" class="input-field" placeholder="Password amministratore" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-large mt-3" style="background: var(--accent-orange);">
                            <i class="fas fa-sign-in-alt"></i> Accedi come Admin
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Se gia loggato come admin, redirect
        const currentAdmin = localStorage.getItem('admin');
        if (currentAdmin) {
            window.location.href = 'dashboard.html';
        }

        // Crea admin default se non esiste
        function ensureDefaultAdmin() {
            let admins = JSON.parse(localStorage.getItem('fc27_admins') || '[]');
            if (admins.length === 0) {
                admins.push({
                    id: 'admin_1',
                    username: 'admin',
                    password: 'admin123',
                    createdAt: new Date().toISOString()
                });
                localStorage.setItem('fc27_admins', JSON.stringify(admins));
            }
        }
        ensureDefaultAdmin();

        // Form submit
        document.getElementById('admin-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            errorDiv.style.display = 'none';

            if (!username || !password) {
                errorText.textContent = 'Compila tutti i campi';
                errorDiv.style.display = 'block';
                return;
            }

            const admins = JSON.parse(localStorage.getItem('fc27_admins') || '[]');
            const foundAdmin = admins.find(a => 
                a.username.toLowerCase() === username.toLowerCase() && 
                a.password === password
            );

            if (!foundAdmin) {
                errorText.textContent = 'Credenziali non valide';
                errorDiv.style.display = 'block';
                return;
            }

            localStorage.setItem('admin', JSON.stringify({
                id: foundAdmin.id,
                username: foundAdmin.username,
                isAdmin: true,
                loginTime: new Date().toISOString()
            }));

            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
